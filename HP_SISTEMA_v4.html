// ── FIRESTORE HELPERS ─────────────────────────────────────────────────
const FS = {
  col: (name) => db.collection(name),
  async getAll(col) {
    const snap = await db.collection(col).orderBy("createdAt","asc").get().catch(()=>db.collection(col).get());
    return snap.docs.map(d => ({...d.data(), id: d.id}));
  },
  async add(col, data) {
    const ref = await db.collection(col).add({...data, createdAt: new Date().toISOString()});
    return ref.id;
  },
  async set(col, id, data) {
    await db.collection(col).doc(id).set(data, {merge:true});
  },
  async update(col, id, data) {
    await db.collection(col).doc(id).set(data);
  },
  async del(col, id) {
    await db.collection(col).doc(id).delete();
  },
  async getDoc(col, id) {
    const d = await db.collection(col).doc(id).get();
    return d.exists ? {...d.data(), id: d.id} : null;
  },
  onSnap(col, cb) {
    return db.collection(col).onSnapshot(snap => {
      const docs = snap.docs.map(d => ({...d.data(), id: d.id}));
      docs.sort((a,b) => (a.createdAt||"") > (b.createdAt||"") ? 1 : -1);
      cb(docs);
    });
  }
};

// ── HELPERS ───────────────────────────────────────────────────────────
const LS = {
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};
const hashPwd = s => { let h=0; for(let i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;} return h.toString(36); };
const fmt = n => (n!=null&&n!==""&&!isNaN(n)) ? Number(n).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:4}) : n||"—";
const fmtCur = n => (n!=null&&n!==""&&!isNaN(n)) ? Number(n).toLocaleString("pt-BR",{style:"currency",currency:"BRL"}) : "—";
const fmtPct = n => (n!=null&&n!==""&&!isNaN(n)) ? (Number(n)*100).toFixed(4)+"%" : "—";
const today = () => new Date().toISOString().split("T")[0];

const DEFAULT_PAYMENT  = ["PIX","TED","DOC","DINHEIRO","CHEQUE","OUTRO"];

// ── SETUP SCREEN ──────────────────────────────────────────────────────

          <div>{"const FIREBASE_CONFIG = {"}</div>
          <div>&nbsp;&nbsp;apiKey: <span style={{color:"#2ECC71"}}>"AIzaSy..."</span>,</div>
          <div>&nbsp;&nbsp;authDomain: <span style={{color:"#2ECC71"}}>"hp-sistema.firebaseapp.com"</span>,</div>
          <div>&nbsp;&nbsp;projectId: <span style={{color:"#2ECC71"}}>"hp-sistema"</span>,</div>
          <div>&nbsp;&nbsp;storageBucket: <span style={{color:"#2ECC71"}}>"hp-sistema.appspot.com"</span>,</div>
          <div>&nbsp;&nbsp;messagingSenderId: <span style={{color:"#2ECC71"}}>"123456..."</span>,</div>

);

// ── LOGIN ─────────────────────────────────────────────────────────────
const LoginScreen = ({onLogin}) => {
  const [login,setLogin] = useState("");
  const [pwd,setPwd]     = useState("");
  const [err,setErr]     = useState("");
  const [loading,setLoading] = useState(false);

  const handleLogin = async () => {
    if(!login.trim()||!pwd.trim()){setErr("Preencha login e senha.");return;}
    setLoading(true); setErr("");
    try {
      const snap = await db.collection("users").where("login","==",login.trim()).get();
      if(snap.empty){setErr("Login ou senha incorretos.");setLoading(false);return;}
      const u = {...snap.docs[0].data(), id: snap.docs[0].id};
      if(u.pwd !== hashPwd(pwd)){setErr("Login ou senha incorretos.");setLoading(false);return;}
      LS.set("hp:session", u);
      onLogin(u);
    } catch(e) {
      setErr("Erro ao conectar. Verifique sua conexão.");
    }
    setLoading(false);
  };

  return (
    <div className="login-screen">
      <div className="login-card fade-in">
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:52,height:52,background:"linear-gradient(135deg,#C9A84C,#8B5E1A)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontFamily:"'Bebas Neue',sans-serif",color:"#0D0F14",margin:"0 auto 14px"}}>HP</div>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:".1em",color:"#C9A84C"}}>HP SISTEMA</div>
          <div style={{fontSize:11,letterSpacing:".15em",color:"#7A8299",marginTop:2}}>LOGÍSTICA MINERAL</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div><label>Login</label><input value={login} onChange={e=>setLogin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="Seu login" autoFocus/></div>
          <div><label>Senha</label><input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="Sua senha"/></div>
          {err&&<div style={{color:"#E74C3C",fontSize:12,fontFamily:"'IBM Plex Mono',monospace"}}>{err}</div>}
          <button className="btn btn-gold" onClick={handleLogin} disabled={loading} style={{marginTop:4,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {loading&&<span className="spinner" style={{width:14,height:14,borderWidth:2}}/>}
            {loading?"Entrando...":"Entrar"}
          </button>
        </div>
      </div>
    </div>
  );
};

// ── USER MANAGER ──────────────────────────────────────────────────────
const UserManager = ({onClose,currentUser,showToast}) => {
  const [users,setUsers]   = useState([]);
  const [form,setForm]     = useState({nome:"",login:"",pwd:"",perfil:"operador"});
  const [err,setErr]       = useState("");
  const [saving,setSaving] = useState(false);

  useEffect(()=>{
    const unsub = FS.onSnap("users", setUsers);
    return ()=>unsub();
  },[]);

  const add = async () => {
    if(!form.nome.trim()||!form.login.trim()||!form.pwd.trim()){setErr("Preencha todos os campos.");return;}
    if(users.find(u=>u.login===form.login.trim())){setErr("Login já existe.");return;}
    setSaving(true);
    await FS.add("users",{nome:form.nome.trim(),login:form.login.trim(),pwd:hashPwd(form.pwd),perfil:form.perfil});
    setForm({nome:"",login:"",pwd:"",perfil:"operador"});setErr("");
    showToast("Usuário criado!");setSaving(false);
  };

  const remove = async (u) => {
    if(u.id===currentUser.id){alert("Você não pode excluir seu próprio usuário.");return;}
    if(!confirm(`Excluir usuário "${u.nome}"?`))return;
    await FS.del("users",u.id);
    showToast("Usuário removido.");
  };

  const resetPwd = async (u) => {
    const nova = prompt("Nova senha para "+u.nome+":");
    if(!nova)return;
    await FS.set("users",u.id,{pwd:hashPwd(nova)});
    showToast("Senha alterada!");
  };

  return (
    <div className="modal-overlay">
      <div className="modal modal-sm slide-in" style={{padding:28}}>

// ── IMPORT XLSX MODAL ─────────────────────────────────────────────────
const ImportModal = ({type,onImport,onClose,certifiers}) => {
  const [preview,setPreview] = useState(null);
  const [error,setError]     = useState("");
  const fileRef = useRef();

  const CAD_COLS    = ["operacao","cliente","lote","cntr","data","cu_pct","au_gr","peso","peso_seco","valor_cu","valor_au","custo_total","certificadora","invoice"];
  const FIN_COLS    = ["data","cliente","lote","operacao","valor","forma_pgto","obs"];
  const CAD_HEADERS = ["Operação","Cliente","Lote","CNTR","Data","CU%","AU-GR","Peso","Peso Seco","Valor CU","Valor AU","Custo Total","Certificadora","Invoice"];
  const FIN_HEADERS = ["Data","Cliente","Lote","Operação","Valor","Forma Pgto","Observações"];
  const cols    = type==="cadastro" ? CAD_COLS    : FIN_COLS;
  const headers = type==="cadastro" ? CAD_HEADERS : FIN_HEADERS;

  const handleFile = e => {
    const file = e.target.files[0]; if(!file)return;
    setError(""); setPreview(null);
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        let rows = [];
        if(file.name.toLowerCase().endsWith(".csv")){
          const lines = ev.target.result.split(/\r?\n/).filter(l=>l.trim());
          if(lines.length<2){setError("Arquivo vazio.");return;}
          rows = lines.slice(1).map(l=>{
            const vals = l.split(/[,;]/).map(v=>v.trim().replace(/^"|"$/g,""));
            const obj = {};
            cols.forEach((c,i)=>{obj[c]=vals[i]||"";});
            return obj;
          });
        } else {
          const wb = XLSX.read(ev.target.result,{type:"array"});
          const ws = wb.Sheets[wb.SheetNames[0]];
          const data = XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
          if(data.length<2){setError("Planilha vazia.");return;}
          rows = data.slice(1).filter(r=>r.some(c=>c!=="")).map(r=>{
            const obj = {};
            cols.forEach((c,i)=>{
              let v = r[i]??"";
              if(c==="data"&&typeof v==="number"){v=new Date(Math.round((v-25569)*86400*1000)).toISOString().split("T")[0];}
              else if(v instanceof Date){v=v.toISOString().split("T")[0];}
              else{v=String(v).trim();}
              obj[c]=v;
            });
            if(type==="cadastro"){obj.custo_total=(parseFloat(obj.valor_cu)||0)+(parseFloat(obj.valor_au)||0);if(!obj.certificadora)obj.certificadora="ASA";}
            if(type==="financeiro"&&!obj.forma_pgto)obj.forma_pgto="PIX";
            return obj;
          });
        }
        if(!rows.length){setError("Nenhuma linha encontrada.");return;}
        setPreview(rows.slice(0,5));
        fileRef.current._rows = rows;
      } catch(err){ setError("Erro ao ler arquivo: "+err.message); }
    };
    if(file.name.toLowerCase().endsWith(".csv")) reader.readAsText(file,"UTF-8");
    else reader.readAsArrayBuffer(file);
  };

  const downloadTemplate = () => {
    const ws = XLSX.utils.aoa_to_sheet([headers]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Template");
    XLSX.writeFile(wb,`template_${type}.xlsx`);
  };

  const doImport = () => {
    if(!fileRef.current?._rows) return;
    onImport(fileRef.current._rows);
    onClose();
  };

  return (
    <div className="modal-overlay">
      <div className="modal slide-in" style={{maxWidth:700,padding:28}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div className="section-title" style={{fontSize:18}}>IMPORTAR PLANILHA — {type.toUpperCase()}</div>
          <button className="btn btn-outline btn-sm" onClick={onClose}>✕</button>
        </div>
        <div style={{background:"#1E2330",border:"1px solid #2E3650",borderRadius:6,padding:"12px 16px",marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:"#C9A84C",letterSpacing:".08em",marginBottom:8}}>ORDEM OBRIGATÓRIA DAS COLUNAS</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {headers.map((h,i)=>(
              <span key={h} style={{background:"#252B3B",border:"1px solid #2E3650",borderRadius:3,padding:"3px 8px",fontSize:11,fontFamily:"'IBM Plex Mono',monospace"}}>
                <span style={{color:"#7A8299"}}>{i+1}.</span> {h}
              </span>
            ))}
          </div>
          <button className="btn btn-outline btn-sm" onClick={downloadTemplate} style={{marginTop:10,fontSize:11}}>⬇ Baixar template .xlsx</button>
        </div>
        <div style={{marginBottom:12}}><label>Selecione o arquivo (.xlsx, .xls ou .csv)</label><input type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} ref={fileRef} style={{padding:"8px"}}/></div>
        {error&&<div style={{color:"#E74C3C",fontSize:12,fontFamily:"'IBM Plex Mono',monospace",marginBottom:10}}>{error}</div>}
        {preview&&(
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:"#7A8299",marginBottom:6}}>Pré-visualização (primeiras {preview.length} linhas) — Total: {fileRef.current?._rows?.length||0} linha(s)</div>
            <div style={{overflowX:"auto"}}>
              <table>
                <thead><tr>{headers.map(h=><th key={h}>{h}</th>)}</tr></thead>
                <tbody>{preview.map((r,i)=><tr key={i}>{cols.map(c=><td key={c} style={{color:"#E8ECF4"}}>{r[c]||"—"}</td>)}</tr>)}</tbody>
              </table>
            </div>
          </div>
        )}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button className="btn btn-outline" onClick={onClose}>Cancelar</button>
          <button className="btn btn-gold" onClick={doImport} disabled={!preview}>Importar {fileRef.current?._rows?.length||0} registros</button>
        </div>
      </div>
    </div>
  );
};

  const [financeiros,setFinanceiros] = useState([]);
  const [saldoInicial,setSaldoInicial] = useState(1720000);
  const [certifiers,setCertifiers]   = useState(DEFAULT_CERTIFIERS);
  const [dataReady,setDataReady]     = useState(false);

  // ── UI STATE ────────────────────────────────────────────────────────
  const [tab,setTab]                   = useState("dashboard");
  const [showCadForm,setShowCadForm]   = useState(false);
  const [editCad,setEditCad]           = useState(null);
  const [showFinForm,setShowFinForm]   = useState(false);
  const [editFin,setEditFin]           = useState(null);
  const [showCertMgr,setShowCertMgr]   = useState(false);
  const [showImportCad,setShowImportCad] = useState(false);
  const [showImportFin,setShowImportFin] = useState(false);
  const [saving,setSaving]             = useState(false);
  const [cadFilters,setCadFilters]     = useState({operacao:"",cliente:"",lote:"",data:""});
  const [finFilters,setFinFilters]     = useState({operacao:"",cliente:"",lote:"",data:""});
  const [relOpF,setRelOpF]             = useState({lote:"",operacao:"",data_ini:"",data_fim:""});
  const [relFinF,setRelFinF]           = useState({cliente:"",operacao:"",data_ini:"",data_fim:""});
  const [toast,setToast]               = useState(null);

  const showToast = (msg,type="success") => setToast({msg,type});

  // ── SEED DEFAULT USERS IF EMPTY ─────────────────────────────────────
  const seedUsers = async () => {
    const snap = await db.collection("users").limit(1).get();
    if(snap.empty){
      for(const u of DEFAULT_USERS){
        await db.collection("users").add(u);
      }
    }
  };

  // ── LOAD SESSION + SEED ─────────────────────────────────────────────
  useEffect(()=>{
    if(!FB_READY){setAuthChecked(true);return;}
    seedUsers().then(()=>{
      const sess = LS.get("hp:session",null);
      if(sess){
        // re-validate session against Firestore
        db.collection("users").doc(sess.id).get().then(d=>{
          if(d.exists){setCurrentUser({...d.data(),id:d.id});}
          else{LS.set("hp:session",null);}
          setAuthChecked(true);
        }).catch(()=>setAuthChecked(true));
      } else {
        setAuthChecked(true);
      }
    }).catch(()=>setAuthChecked(true));
  },[]);

  // ── REAL-TIME LISTENERS ─────────────────────────────────────────────
  useEffect(()=>{
    if(!currentUser||!FB_READY)return;
    setDataReady(false);
    const unsubs = [];

    unsubs.push(FS.onSnap("cadastros", setCadastros));
    unsubs.push(FS.onSnap("financeiros", setFinanceiros));

    // Load config (not real-time, but reload on mount)
    db.collection("config").doc("app").get().then(d=>{
      if(d.exists){
        const cfg = d.data();
        if(cfg.saldoInicial!=null) setSaldoInicial(cfg.saldoInicial);
        if(cfg.certifiers)         setCertifiers(cfg.certifiers);
      }
      setDataReady(true);
    }).catch(()=>setDataReady(true));

    return ()=>unsubs.forEach(u=>u());
  },[currentUser]);

  // ── SAVE CONFIG ──────────────────────────────────────────────────────
  const saveConfig = async (saldo, certs) => {
    await FS.set("config","app",{saldoInicial:saldo, certifiers:certs});
  };

  const updateSaldo = async (val) => {
    setSaldoInicial(val);
    await saveConfig(val, certifiers);
  };

  const updateCertifiers = async (list) => {
    setCertifiers(list);
    await saveConfig(saldoInicial, list);
    showToast("Certificadoras salvas!");
    setShowCertMgr(false);
  };

  // ── CRUD CADASTRO ────────────────────────────────────────────────────
  const saveCad = async (d) => {
    setSaving(true);
    try {
      const data = {...d, custo_total: (parseFloat(d.valor_cu)||0)+(parseFloat(d.valor_au)||0)};
      if(editCad?.id) await FS.update("cadastros", editCad.id, data);
      else             await FS.add("cadastros", data);
      setShowCadForm(false); setEditCad(null);
      showToast("Operação salva!");
    } catch(e){ showToast("Erro ao salvar: "+e.message,"error"); }
    setSaving(false);
  };

  const delCad = async (id) => {
    if(!confirm("Excluir operação?"))return;
    await FS.del("cadastros",id);
    showToast("Operação excluída.","info");
  };

  const importCadRows = async (rows) => {
    showToast("Importando "+rows.length+" registros...","info");
    for(const r of rows){ await FS.add("cadastros", r); }
    showToast(rows.length+" operações importadas!");
  };

  // ── CRUD FINANCEIRO ──────────────────────────────────────────────────
  const saveFin = async (d) => {
    setSaving(true);
    try {
      if(editFin?.id) await FS.update("financeiros", editFin.id, d);
      else             await FS.add("financeiros", d);
      setShowFinForm(false); setEditFin(null);
      showToast("Recebimento salvo!");
    } catch(e){ showToast("Erro ao salvar: "+e.message,"error"); }
    setSaving(false);
  };

  const delFin = async (id) => {
    if(!confirm("Excluir recebimento?"))return;
    await FS.del("financeiros",id);
    showToast("Recebimento excluído.","info");
  };

  const importFinRows = async (rows) => {
    showToast("Importando "+rows.length+" registros...","info");
    for(const r of rows){ await FS.add("financeiros", r); }
    showToast(rows.length+" recebimentos importados!");
  };

  // ── AUTH ─────────────────────────────────────────────────────────────
  const handleLogin  = u => { setCurrentUser(u); LS.set("hp:session",u); };
  const handleLogout = () => { setCurrentUser(null); LS.set("hp:session",null); setDataReady(false); };

  // ── FILTERS ──────────────────────────────────────────────────────────
  const applyF = (list,f) => list.filter(r=>{
    if(f.operacao&&!(r.operacao||"").toLowerCase().includes(f.operacao.toLowerCase()))return false;
    if(f.cliente&&!(r.cliente||"").toLowerCase().includes(f.cliente.toLowerCase()))return false;
    if(f.lote&&!(r.lote||"").toLowerCase().includes(f.lote.toLowerCase()))return false;
    if(f.data&&r.data!==f.data)return false;
    return true;
  });
  const filteredCad = applyF(cadastros, cadFilters);
  const filteredFin = applyF(financeiros, finFilters);

  const filterOp = cadastros.filter(c=>{
    if(relOpF.lote&&!c.lote.toLowerCase().includes(relOpF.lote.toLowerCase()))return false;
    if(relOpF.operacao&&!c.operacao.toLowerCase().includes(relOpF.operacao.toLowerCase()))return false;
    if(relOpF.data_ini&&c.data<relOpF.data_ini)return false;
    if(relOpF.data_fim&&c.data>relOpF.data_fim)return false;
    return true;
  });
  const filterFin = financeiros.filter(f=>{
    if(relFinF.cliente&&!(f.cliente||"").toLowerCase().includes(relFinF.cliente.toLowerCase()))return false;
    if(relFinF.operacao&&!(f.operacao||"").toLowerCase().includes(relFinF.operacao.toLowerCase()))return false;
    if(relFinF.data_ini&&f.data<relFinF.data_ini)return false;
    if(relFinF.data_fim&&f.data>relFinF.data_fim)return false;
    return true;
  });
  const finWithBal = (()=>{
    let bal = saldoInicial;
    return [...filterFin].reverse().map(f=>{ const prev=bal; bal+=parseFloat(f.valor)||0; return {...f,saldo_anterior:prev,saldo_atual:bal}; }).reverse();
  })();

  const totalCusto = cadastros.reduce((a,c)=>a+(parseFloat(c.custo_total)||0),0);
  const totalRec   = financeiros.reduce((a,f)=>a+(parseFloat(f.valor)||0),0);
  const saldo      = saldoInicial + totalRec;

  // ── RENDER GUARDS ─────────────────────────────────────────────────────
  if(!FB_READY)    return <SetupScreen/>;
  if(!authChecked) return <LoadingScreen msg="Verificando conexão..."/>;
  if(!currentUser) return <LoginScreen onLogin={handleLogin}/>;
  if(!dataReady)   return <LoadingScreen msg="Carregando dados..."/>;

  // ── RENDER ─────────────────────────────────────────────────────────────
  return (
    <>
      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}

      {showCadForm&&<div className="modal-overlay"><div className="modal fade-in">
        <CadastroForm initial={editCad} onSave={saveCad} onCancel={()=>{setShowCadForm(false);setEditCad(null);}} certifiers={certifiers} onManageCerts={()=>setShowCertMgr(true)} saving={saving}/>
      </div></div>}
      {showFinForm&&<div className="modal-overlay"><div className="modal fade-in" style={{maxWidth:700}}>
        <FinanceiroForm initial={editFin} onSave={saveFin} onCancel={()=>{setShowFinForm(false);setEditFin(null);}} cadastros={cadastros} saving={saving}/>
      </div></div>}
      {showCertMgr&&<CertifierManager certifiers={certifiers} onSave={updateCertifiers} onClose={()=>setShowCertMgr(false)}/>}
      {showImportCad&&<ImportModal type="cadastro" onImport={importCadRows} onClose={()=>setShowImportCad(false)} certifiers={certifiers}/>}
      {showImportFin&&<ImportModal type="financeiro" onImport={importFinRows} onClose={()=>setShowImportFin(false)} certifiers={certifiers}/>}
      {showUserMgr&&<UserManager onClose={()=>setShowUserMgr(false)} currentUser={currentUser} showToast={showToast}/>}

      <Nav active={tab} setActive={setTab} currentUser={currentUser} onLogout={handleLogout} onManageUsers={()=>setShowUserMgr(true)}/>

      <div style={{padding:"24px 28px",maxWidth:1600,margin:"0 auto"}}>

        {/* ── PAINEL ─────────────────────────────────────────────── */}
        {tab==="dashboard"&&<div className="fade-in">
          <div style={{marginBottom:24}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,letterSpacing:".08em",color:"#C9A84C"}}>PAINEL GERAL</div>
            <div style={{color:"#7A8299",fontSize:13}}>Visão consolidada das operações</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:24}}>
            <StatCard label="Operações Cadastradas" value={cadastros.length} color="#C9A84C"/>
            <StatCard label="Total de Recebimentos" value={financeiros.length} color="#3B82F6"/>
            <StatCard label="Custo Total Operações" value={fmtCur(totalCusto)} color="#E74C3C"/>
            <StatCard label="Saldo Atual" value={fmtCur(saldo)} sub={"Inicial: "+fmtCur(saldoInicial)} color="#2ECC71"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,marginBottom:18}}>
            <div className="card">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <div className="section-title" style={{fontSize:16}}>ÚLTIMAS OPERAÇÕES</div>
                <button className="btn btn-gold btn-sm" onClick={()=>{setTab("cadastro");setShowCadForm(true);}}>+ Nova</button>
              </div>
              <table><thead><tr><th>Lote</th><th>Operação</th><th>Data</th><th>Custo Total</th></tr></thead>
                <tbody>
                  {cadastros.slice(-8).reverse().map(c=><tr key={c.id}><td><span className="tag badge-gold">{c.lote}</span></td><td style={{color:"#7A8299"}}>{c.operacao}</td><td style={{color:"#7A8299"}}>{c.data}</td><td className="text-gold">{fmtCur(c.custo_total)}</td></tr>)}
                  {cadastros.length===0&&<tr><td colSpan={4} style={{textAlign:"center",color:"#7A8299",padding:24}}>Nenhuma operação registrada</td></tr>}
                </tbody>
              </table>
            </div>
            <div className="card">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <div className="section-title" style={{fontSize:16}}>ÚLTIMOS RECEBIMENTOS</div>
                <button className="btn btn-gold btn-sm" onClick={()=>{setTab("financeiro");setShowFinForm(true);}}>+ Novo</button>
              </div>
              <table><thead><tr><th>Data</th><th>Cliente</th><th>Valor</th><th>Forma</th></tr></thead>
                <tbody>
                  {financeiros.slice(-8).reverse().map(f=><tr key={f.id}><td style={{color:"#7A8299"}}>{f.data}</td><td>{f.cliente}</td><td className="text-green">{fmtCur(f.valor)}</td><td><span className="tag badge-blue">{f.forma_pgto}</span></td></tr>)}
                  {financeiros.length===0&&<tr><td colSpan={4} style={{textAlign:"center",color:"#7A8299",padding:24}}>Nenhum recebimento</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
          {isAdmin&&<div className="card" style={{padding:"14px 20px"}}>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:".1em",color:"#7A8299",textTransform:"uppercase",whiteSpace:"nowrap"}}>Saldo Inicial (Base)</div>
              <input type="number" value={saldoInicial} onChange={e=>setSaldoInicial(parseFloat(e.target.value)||0)} onBlur={e=>updateSaldo(parseFloat(e.target.value)||0)} style={{width:200}}/>
              <div style={{fontSize:12,color:"#7A8299"}}>Valor base para cálculo do saldo corrente</div>
            </div>
          </div>}
        </div>}

        {/* ── CADASTRO ─────────────────────────────────────────── */}
        {tab==="cadastro"&&<div className="fade-in">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
            <div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,letterSpacing:".08em",color:"#C9A84C"}}>CADASTRO DE OPERAÇÃO</div>
              <div style={{color:"#7A8299",fontSize:13}}>{cadastros.length} operações • {filteredCad.length} exibidas</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btn-outline btn-sm" onClick={()=>setShowCertMgr(true)}>⚙ Certificadoras</button>
              {isAdmin&&<button className="btn btn-green btn-sm" onClick={()=>setShowImportCad(true)}>⬆ Importar Planilha</button>}
              <button className="btn btn-gold" onClick={()=>{setEditCad(null);setShowCadForm(true);}}>+ Nova Operação</button>
            </div>
          </div>
          <FilterBar filters={cadFilters} setFilters={setCadFilters} count={filteredCad.length} total={cadastros.length} onClear={()=>setCadFilters({operacao:"",cliente:"",lote:"",data:""})}/>
          <div style={{overflowX:"auto"}}>
            <table>
              <thead><tr><th>#</th><th>Operação</th><th>Cliente</th><th>Lote</th><th>CNTR</th><th>Data</th><th>CU%</th><th>AU-GR</th><th>Peso kg</th><th>Peso Seco</th><th>Valor CU</th><th>Valor AU</th><th>Custo Total</th><th>Certif.</th><th>Invoice</th><th style={{textAlign:"center",minWidth:120}}>Ações</th></tr></thead>
              <tbody>
                {filteredCad.map((c,i)=>(
                  <tr key={c.id}>
                    <td className="text-muted">{i+1}</td>
                    <td><span className="tag badge-gold">{c.operacao}</span></td>
                    <td>{c.cliente}</td><td className="text-gold">{c.lote}</td>
                    <td className="text-muted">{fmt(c.cntr)}</td><td className="text-muted">{c.data}</td>
                    <td>{fmtPct(c.cu_pct)}</td><td>{fmt(c.au_gr)}</td>
                    <td>{fmt(c.peso)}</td><td>{fmt(c.peso_seco)}</td>
                    <td className="text-gold">{fmtCur(c.valor_cu)}</td><td className="text-gold">{fmtCur(c.valor_au)}</td>
                    <td style={{fontWeight:600,color:"#C9A84C"}}>{fmtCur(c.custo_total)}</td>
                    <td><span className="tag badge-blue">{c.certificadora}</span></td>
                    <td className="text-muted">{c.invoice}</td>
                    <td style={{display:"flex",gap:6,justifyContent:"center",padding:"6px 8px"}}>
                      <button className="btn btn-outline btn-sm" onClick={()=>{setEditCad(c);setShowCadForm(true);}}>✎ Editar</button>
                      <button className="btn btn-danger" onClick={()=>delCad(c.id)}>✕</button>
                    </td>
                  </tr>
                ))}
                {filteredCad.length===0&&<tr><td colSpan={16} style={{textAlign:"center",color:"#7A8299",padding:40}}>{cadastros.length===0?"Nenhuma operação cadastrada.":"Nenhum resultado para os filtros."}</td></tr>}
              </tbody>
            </table>
          </div>
        </div>}

        {/* ── FINANCEIRO ────────────────────────────────────────── */}
        {tab==="financeiro"&&<div className="fade-in">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
            <div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,letterSpacing:".08em",color:"#C9A84C"}}>RECEBIMENTOS</div>
              <div style={{color:"#7A8299",fontSize:13}}>Saldo atual: <span style={{color:"#2ECC71",fontFamily:"'IBM Plex Mono',monospace"}}>{fmtCur(saldo)}</span></div>
            </div>
            <div style={{display:"flex",gap:8}}>
              {isAdmin&&<button className="btn btn-green btn-sm" onClick={()=>setShowImportFin(true)}>⬆ Importar Planilha</button>}
              <button className="btn btn-gold" onClick={()=>{setEditFin(null);setShowFinForm(true);}}>+ Novo Recebimento</button>
            </div>
          </div>
          <FilterBar filters={finFilters} setFilters={setFinFilters} count={filteredFin.length} total={financeiros.length} onClear={()=>setFinFilters({operacao:"",cliente:"",lote:"",data:""})}/>
          <div style={{overflowX:"auto"}}>
            <table>
              <thead><tr><th>#</th><th>Data</th><th>Cliente</th><th>Lote</th><th>Operação</th><th>Valor</th><th>Forma Pgto</th><th>Observações</th><th style={{textAlign:"center",minWidth:120}}>Ações</th></tr></thead>
              <tbody>
                {filteredFin.map((f,i)=>(
                  <tr key={f.id}>
                    <td className="text-muted">{i+1}</td>
                    <td className="text-muted">{f.data}</td><td>{f.cliente}</td>
                    <td className="text-gold">{f.lote}</td><td>{f.operacao}</td>
                    <td className="text-green" style={{fontWeight:600}}>{fmtCur(f.valor)}</td>
                    <td><span className="tag badge-blue">{f.forma_pgto}</span></td>
                    <td style={{color:"#7A8299",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis"}}>{f.obs}</td>
                    <td style={{display:"flex",gap:6,justifyContent:"center",padding:"6px 8px"}}>
                      <button className="btn btn-outline btn-sm" onClick={()=>{setEditFin(f);setShowFinForm(true);}}>✎ Editar</button>
                      <button className="btn btn-danger" onClick={()=>delFin(f.id)}>✕</button>
                    </td>
                  </tr>
                ))}
                {filteredFin.length===0&&<tr><td colSpan={9} style={{textAlign:"center",color:"#7A8299",padding:40}}>{financeiros.length===0?"Nenhum recebimento registrado.":"Nenhum resultado para os filtros."}</td></tr>}
              </tbody>
            </table>
          </div>
        </div>}

        {/* ── REL. OPERAÇÃO ────────────────────────────────────── */}
        {tab==="rel_operacao"&&<div className="fade-in">
          <div style={{marginBottom:20}}><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,letterSpacing:".08em",color:"#C9A84C"}}>RELATÓRIO DE OPERAÇÃO</div></div>
          <div className="card no-print" style={{marginBottom:18}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:".12em",color:"#7A8299",textTransform:"uppercase",marginBottom:10}}>FILTROS</div>
            <Grid cols={4}>
              <FG label="Lote"><input value={relOpF.lote} onChange={e=>setRelOpF(p=>({...p,lote:e.target.value}))} placeholder="Filtrar lote..."/></FG>
              <FG label="Operação"><input value={relOpF.operacao} onChange={e=>setRelOpF(p=>({...p,operacao:e.target.value}))} placeholder="Filtrar operação..."/></FG>
              <FG label="Data Inicial"><input type="date" value={relOpF.data_ini} onChange={e=>setRelOpF(p=>({...p,data_ini:e.target.value}))}/></FG>
              <FG label="Data Final"><input type="date" value={relOpF.data_fim} onChange={e=>setRelOpF(p=>({...p,data_fim:e.target.value}))}/></FG>
            </Grid>
            <div style={{marginTop:10,display:"flex",gap:8,justifyContent:"flex-end",alignItems:"center"}}>
              <span style={{fontSize:12,color:"#7A8299"}}>{filterOp.length} resultado(s)</span>
              <button className="btn btn-outline btn-sm" onClick={()=>setRelOpF({lote:"",operacao:"",data_ini:"",data_fim:""})}>Limpar</button>
              <button className="btn btn-gold btn-sm" onClick={()=>window.print()}>🖨 Imprimir</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:18}}>
            <StatCard label="Operações" value={filterOp.length} color="#C9A84C"/>
            <StatCard label="Total CU" value={fmtCur(filterOp.reduce((a,c)=>a+(parseFloat(c.valor_cu)||0),0))} color="#C9A84C"/>
            <StatCard label="Total AU" value={fmtCur(filterOp.reduce((a,c)=>a+(parseFloat(c.valor_au)||0),0))} color="#C9A84C"/>
            <StatCard label="Total Geral" value={fmtCur(filterOp.reduce((a,c)=>a+(parseFloat(c.custo_total)||0),0))} color="#2ECC71"/>
          </div>
          <div style={{overflowX:"auto"}}>
            <table>
              <thead><tr><th>Data</th><th>Lote</th><th>Operação</th><th>Cliente</th><th>CNTR</th><th>CU%</th><th>AU-GR</th><th>Peso (kg)</th><th>Peso Seco</th><th>Valor CU</th><th>Valor AU</th><th>Custo Total</th><th>Certif.</th></tr></thead>
              <tbody>
                {filterOp.map(c=><tr key={c.id}><td>{c.data}</td><td className="text-gold">{c.lote}</td><td>{c.operacao}</td><td>{c.cliente}</td><td>{fmt(c.cntr)}</td><td>{fmtPct(c.cu_pct)}</td><td>{fmt(c.au_gr)}</td><td>{fmt(c.peso)}</td><td>{fmt(c.peso_seco)}</td><td>{fmtCur(c.valor_cu)}</td><td>{fmtCur(c.valor_au)}</td><td style={{fontWeight:600,color:"#C9A84C"}}>{fmtCur(c.custo_total)}</td><td>{c.certificadora}</td></tr>)}
                {filterOp.length===0&&<tr><td colSpan={13} style={{textAlign:"center",color:"#7A8299",padding:32}}>Nenhum resultado.</td></tr>}
                {filterOp.length>0&&<tr style={{background:"#1E2330",borderTop:"2px solid #C9A84C"}}>
                  <td colSpan={9} style={{fontWeight:700,color:"#7A8299",fontSize:11}}>TOTAIS</td>
                  <td style={{fontWeight:700,color:"#C9A84C"}}>{fmtCur(filterOp.reduce((a,c)=>a+(parseFloat(c.valor_cu)||0),0))}</td>
                  <td style={{fontWeight:700,color:"#C9A84C"}}>{fmtCur(filterOp.reduce((a,c)=>a+(parseFloat(c.valor_au)||0),0))}</td>
                  <td style={{fontWeight:700,color:"#C9A84C"}}>{fmtCur(filterOp.reduce((a,c)=>a+(parseFloat(c.custo_total)||0),0))}</td>
                  <td></td>
                </tr>}
              </tbody>
            </table>
          </div>
        </div>}

        {/* ── REL. FINANCEIRO ───────────────────────────────────── */}
        {tab==="rel_financeiro"&&<div className="fade-in">
          <div style={{marginBottom:20}}><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,letterSpacing:".08em",color:"#C9A84C"}}>RELATÓRIO FINANCEIRO</div></div>
          <div className="card no-print" style={{marginBottom:18}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:".12em",color:"#7A8299",textTransform:"uppercase",marginBottom:10}}>FILTROS</div>
            <Grid cols={4}>
              <FG label="Cliente"><input value={relFinF.cliente} onChange={e=>setRelFinF(p=>({...p,cliente:e.target.value}))} placeholder="Filtrar cliente..."/></FG>
              <FG label="Operação"><input value={relFinF.operacao} onChange={e=>setRelFinF(p=>({...p,operacao:e.target.value}))} placeholder="Filtrar operação..."/></FG>
              <FG label="Data Inicial"><input type="date" value={relFinF.data_ini} onChange={e=>setRelFinF(p=>({...p,data_ini:e.target.value}))}/></FG>
              <FG label="Data Final"><input type="date" value={relFinF.data_fim} onChange={e=>setRelFinF(p=>({...p,data_fim:e.target.value}))}/></FG>
            </Grid>
            <div style={{marginTop:10,display:"flex",gap:8,justifyContent:"flex-end",alignItems:"center"}}>
              <span style={{fontSize:12,color:"#7A8299"}}>{filterFin.length} resultado(s)</span>
              <button className="btn btn-outline btn-sm" onClick={()=>setRelFinF({cliente:"",operacao:"",data_ini:"",data_fim:""})}>Limpar</button>
              <button className="btn btn-gold btn-sm" onClick={()=>window.print()}>🖨 Imprimir</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:18}}>
            <StatCard label="Transações" value={filterFin.length} color="#C9A84C"/>
            <StatCard label="Total Recebido" value={fmtCur(filterFin.reduce((a,f)=>a+(parseFloat(f.valor)||0),0))} color="#2ECC71"/>
            <StatCard label="Saldo Atual" value={fmtCur(saldo)} sub={"Base: "+fmtCur(saldoInicial)} color="#2ECC71"/>
          </div>
          <div style={{overflowX:"auto"}}>
            <table>
              <thead><tr><th>Data</th><th>Cliente</th><th>Lote</th><th>Operação</th><th>Valor</th><th>Saldo Anterior</th><th>Saldo Atual</th><th>Forma Pgto</th><th>Obs</th></tr></thead>
              <tbody>
                {finWithBal.map(f=><tr key={f.id}><td>{f.data}</td><td>{f.cliente}</td><td className="text-gold">{f.lote}</td><td>{f.operacao}</td><td className="text-green" style={{fontWeight:600}}>{fmtCur(f.valor)}</td><td style={{color:"#7A8299"}}>{fmtCur(f.saldo_anterior)}</td><td style={{color:"#2ECC71",fontWeight:600}}>{fmtCur(f.saldo_atual)}</td><td><span className="tag badge-blue">{f.forma_pgto}</span></td><td style={{color:"#7A8299",fontSize:11}}>{f.obs}</td></tr>)}
                {finWithBal.length===0&&<tr><td colSpan={9} style={{textAlign:"center",color:"#7A8299",padding:32}}>Nenhum resultado.</td></tr>}
                {finWithBal.length>0&&<tr style={{background:"#1E2330",borderTop:"2px solid #2ECC71"}}>
                  <td colSpan={4} style={{fontWeight:700,color:"#7A8299",fontSize:11}}>TOTAIS</td>
                  <td style={{fontWeight:700,color:"#2ECC71"}}>{fmtCur(filterFin.reduce((a,f)=>a+(parseFloat(f.valor)||0),0))}</td>
                  <td></td><td style={{fontWeight:700,color:"#2ECC71"}}>{fmtCur(saldo)}</td>
                  <td colSpan={2}></td>
                </tr>}
              </tbody>
            </table>
          </div>
        </div>}

      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
