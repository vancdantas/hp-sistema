<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo} = React;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  🔥 CONFIGURAÇÃO FIREBASE — SUBSTITUA PELOS SEUS VALORES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const FIREBASE_CONFIG = {

  projectId:         "hp-sistema",
  storageBucket:     "hp-sistema.firebasestorage.app",

};
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const FB_READY = FIREBASE_CONFIG.apiKey !== "COLE_AQUI" && typeof firebase !== "undefined";
const FB_LIB_MISSING = FIREBASE_CONFIG.apiKey !== "COLE_AQUI" && typeof firebase === "undefined";
let db = null;
if (FB_READY) {
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
  } catch(e) { console.error("Firebase init error:", e); }
}

// ── FIRESTORE HELPERS ─────────────────────────────────────────────────
const FS = {
  col: (name) => db.collection(name),
  async getAll(col) {
    const snap = await db.collection(col).orderBy("createdAt","asc").get().catch(()=>db.collection(col).get());
    return snap.docs.map(d => ({...d.data(), id: d.id}));
  },
  async add(col, data) {
    const ref = await db.collection(col).add({...data, createdAt: new Date().toISOString()});
    return ref.id;
  },
  async set(col, id, data) {
    await db.collection(col).doc(id).set(data, {merge:true});
  },
  async update(col, id, data) {
    await db.collection(col).doc(id).set(data);
  },
  async del(col, id) {
    await db.collection(col).doc(id).delete();
  },
  async getDoc(col, id) {
    const d = await db.collection(col).doc(id).get();
    return d.exists ? {...d.data(), id: d.id} : null;
  },
  onSnap(col, cb) {
    return db.collection(col).onSnapshot(snap => {
      const docs = snap.docs.map(d => ({...d.data(), id: d.id}));
      docs.sort((a,b) => (a.createdAt||"") > (b.createdAt||"") ? 1 : -1);
      cb(docs);
    });
  }
};

// ── HELPERS ───────────────────────────────────────────────────────────
const LS = {
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};
const hashPwd = s => { let h=0; for(let i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;} return h.toString(36); };
const fmt = n => (n!=null&&n!==""&&!isNaN(n)) ? Number(n).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:4}) : n||"—";
const fmtCur = n => (n!=null&&n!==""&&!isNaN(n)) ? Number(n).toLocaleString("pt-BR",{style:"currency",currency:"BRL"}) : "—";
const fmtPct = n => (n!=null&&n!==""&&!isNaN(n)) ? (Number(n)*100).toFixed(4)+"%" : "—";
const today = () => new Date().toISOString().split("T")[0];

const DEFAULT_PAYMENT  = ["PIX","TED","DOC","DINHEIRO","CHEQUE","OUTRO"];
const DEFAULT_CERTIFIERS = ["ASA","SGS","BUREAU VERITAS","INTERTEK","OUTRO"];
const DEFAULT_USERS = [
  {login:"admin",    pwd:hashPwd("admin123"),    nome:"Administrador", perfil:"admin"},
  {login:"operador", pwd:hashPwd("operador123"), nome:"Operador",      perfil:"operador"},
  {login:"gestor",   pwd:hashPwd("gestor123"),   nome:"Gestor",        perfil:"gestor"}
];
const ALL_TABS = [
  {id:"dashboard",     label:"PAINEL",          perfis:["admin","gestor"]},
  {id:"cadastro",      label:"CADASTRO",         perfis:["admin","operador"]},
  {id:"financeiro",    label:"FINANCEIRO",       perfis:["admin","operador"]},
  {id:"rel_operacao",  label:"REL. OPERAÇÃO",    perfis:["admin","gestor"]},
  {id:"rel_financeiro",label:"REL. FINANCEIRO",  perfis:["admin","gestor"]}
];
const tabsForPerfil = p => ALL_TABS.filter(t=>t.perfis.includes(p));
const perfilLabel = p => p==="admin"?"ADMIN":p==="gestor"?"GESTOR":"OPERADOR";
const perfilBadge = p => p==="admin"?"badge-admin":p==="gestor"?"badge-gestor":"badge-operador";

// ── SETUP SCREEN ──────────────────────────────────────────────────────
const SetupScreen = () => (
  <div className="setup-screen">
    <div className="setup-card fade-in">
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{width:52,height:52,background:"linear-gradient(135deg,#C9A84C,#8B5E1A)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontFamily:"'Bebas Neue',sans-serif",color:"#0D0F14",margin:"0 auto 14px"}}>HP</div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:".1em",color:"#C9A84C"}}>HP SISTEMA</div>
        <div style={{fontSize:11,color:"#7A8299",letterSpacing:".15em",marginTop:2}}>CONFIGURAÇÃO DO BANCO DE DADOS</div>
      </div>

      <div style={{background:"rgba(231,76,60,.08)",border:"1px solid rgba(231,76,60,.3)",borderRadius:6,padding:"12px 16px",marginBottom:20}}>
        <div style={{color:"#E74C3C",fontWeight:700,fontSize:12,marginBottom:4}}>⚠ Firebase não configurado</div>
        <div style={{color:"#7A8299",fontSize:12}}>Substitua os valores em FIREBASE_CONFIG no arquivo HTML antes de publicar.</div>
      </div>

      <div style={{fontSize:11,fontWeight:700,color:"#C9A84C",letterSpacing:".1em",marginBottom:12}}>SIGA ESTES PASSOS:</div>

      {[
        ["1","Acesse console.firebase.google.com com sua conta Google"],
        ["2","Clique em Criar projeto → dê um nome (ex: hp-sistema) → Criar"],
        ["3","No menu lateral, clique em Firestore Database → Criar banco de dados"],
        ["4","Escolha Modo de teste → próxima → Concluir"],
        ["5","No menu lateral, clique em Visão geral do projeto (ícone ⚙) → Configurações"],
        ["6","Role até Seus apps → clique em </> (Web) → registre com qualquer nome"],
        ["7","Copie o objeto firebaseConfig que aparecer"],
        ["8","Cole os valores dentro de FIREBASE_CONFIG no arquivo HP_SISTEMA.html"],
        ["9","Salve e faça o upload do arquivo no GitHub — o Vercel atualiza automaticamente"],
      ].map(([n,t]) => (
        <div key={n} style={{display:"flex",gap:12,marginBottom:8,alignItems:"flex-start"}}>
          <span style={{minWidth:22,height:22,background:"#C9A84C",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#0D0F14",flexShrink:0}}>{n}</span>
          <span style={{fontSize:12,color:"#E8ECF4",lineHeight:1.5}}>{t}</span>
        </div>
      ))}

      <div style={{marginTop:20,background:"#1E2330",border:"1px solid #2E3650",borderRadius:6,padding:"12px 16px"}}>
        <div style={{fontSize:10,color:"#7A8299",fontFamily:"'IBM Plex Mono',monospace",lineHeight:1.8}}>
          <div style={{color:"#C9A84C",marginBottom:4,fontWeight:700}}>EXEMPLO DO FIREBASE_CONFIG:</div>
          <div>{"const FIREBASE_CONFIG = {"}</div>
          <div>&nbsp;&nbsp;apiKey: <span style={{color:"#2ECC71"}}>"AIzaSy..."</span>,</div>
          <div>&nbsp;&nbsp;authDomain: <span style={{color:"#2ECC71"}}>"hp-sistema.firebaseapp.com"</span>,</div>
          <div>&nbsp;&nbsp;projectId: <span style={{color:"#2ECC71"}}>"hp-sistema"</span>,</div>
          <div>&nbsp;&nbsp;storageBucket: <span style={{color:"#2ECC71"}}>"hp-sistema.appspot.com"</span>,</div>
          <div>&nbsp;&nbsp;messagingSenderId: <span style={{color:"#2ECC71"}}>"123456..."</span>,</div>
          <div>&nbsp;&nbsp;appId: <span style={{color:"#2ECC71"}}>"1:123456:web:abc..."</span></div>
          <div>{"}"}</div>
        </div>
      </div>
    </div>
  </div>
);

// ── LOADING SCREEN ────────────────────────────────────────────────────
const LoadingScreen = ({msg="Carregando..."}) => (

// ── TOAST ─────────────────────────────────────────────────────────────
const Toast = ({msg,type,onDone}) => {
  useEffect(()=>{const t=setTimeout(onDone,3000);return()=>clearTimeout(t);},[]);
  return <div className={`toast toast-${type}`}><span>{type==="success"?"✓":type==="error"?"✕":"ℹ"}</span>{msg}</div>;

// ── NAV ───────────────────────────────────────────────────────────────
const Nav = ({active,setActive,currentUser,onLogout,onManageUsers,onBackup}) => {
  const tabs = tabsForPerfil(currentUser.perfil);
  return (
  <nav style={{background:"#161A23",borderBottom:"1px solid #2E3650",display:"flex",alignItems:"center",padding:"0 24px",position:"sticky",top:0,zIndex:100}} className="no-print">

// ── LOGIN ─────────────────────────────────────────────────────────────
const LoginScreen = ({onLogin}) => {
  const [login,setLogin] = useState("");
  const [pwd,setPwd]     = useState("");
  const [err,setErr]     = useState("");
  const [loading,setLoading] = useState(false);

  const handleLogin = async () => {
    if(!login.trim()||!pwd.trim()){setErr("Preencha login e senha.");return;}
    setLoading(true); setErr("");
    try {
      const snap = await db.collection("users").where("login","==",login.trim()).get();
      if(snap.empty){setErr("Login ou senha incorretos.");setLoading(false);return;}
      const u = {...snap.docs[0].data(), id: snap.docs[0].id};
      if(u.pwd !== hashPwd(pwd)){setErr("Login ou senha incorretos.");setLoading(false);return;}
      LS.set("hp:session", u);
      onLogin(u);
    } catch(e) {
      setErr("Erro ao conectar. Verifique sua conexão.");
    }
    setLoading(false);
  };

  return (
    <div className="login-screen">
      <div className="login-card fade-in">
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:52,height:52,background:"linear-gradient(135deg,#C9A84C,#8B5E1A)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontFamily:"'Bebas Neue',sans-serif",color:"#0D0F14",margin:"0 auto 14px"}}>HP</div>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:".1em",color:"#C9A84C"}}>HP SISTEMA</div>
          <div style={{fontSize:11,letterSpacing:".15em",color:"#7A8299",marginTop:2}}>LOGÍSTICA MINERAL</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div><label>Login</label><input value={login} onChange={e=>setLogin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="Seu login" autoFocus/></div>
          <div><label>Senha</label><input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="Sua senha"/></div>
          {err&&<div style={{color:"#E74C3C",fontSize:12,fontFamily:"'IBM Plex Mono',monospace"}}>{err}</div>}
          <button className="btn btn-gold" onClick={handleLogin} disabled={loading} style={{marginTop:4,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {loading&&<span className="spinner" style={{width:14,height:14,borderWidth:2}}/>}
            {loading?"Entrando...":"Entrar"}
          </button>
        </div>
      </div>
    </div>
  );
};

// ── USER MANAGER ──────────────────────────────────────────────────────
const UserManager = ({onClose,currentUser,showToast}) => {
  const [users,setUsers]   = useState([]);
  const [form,setForm]     = useState({nome:"",login:"",pwd:"",perfil:"operador"});
  const [err,setErr]       = useState("");
  const [saving,setSaving] = useState(false);

  useEffect(()=>{
    const unsub = FS.onSnap("users", setUsers);
    return ()=>unsub();
  },[]);

  const add = async () => {
    if(!form.nome.trim()||!form.login.trim()||!form.pwd.trim()){setErr("Preencha todos os campos.");return;}
    if(users.find(u=>u.login===form.login.trim())){setErr("Login já existe.");return;}
    setSaving(true);
    await FS.add("users",{nome:form.nome.trim(),login:form.login.trim(),pwd:hashPwd(form.pwd),perfil:form.perfil});
    setForm({nome:"",login:"",pwd:"",perfil:"operador"});setErr("");
    showToast("Usuário criado!");setSaving(false);
  };

  const remove = async (u) => {
    if(u.id===currentUser.id){alert("Você não pode excluir seu próprio usuário.");return;}
    if(!confirm(`Excluir usuário "${u.nome}"?`))return;
    await FS.del("users",u.id);
    showToast("Usuário removido.");
  };

  const resetPwd = async (u) => {
    const nova = prompt("Nova senha para "+u.nome+":");
    if(!nova)return;
    await FS.set("users",u.id,{pwd:hashPwd(nova)});
    showToast("Senha alterada!");
  };

  return (
    <div className="modal-overlay">
      <div className="modal modal-sm slide-in" style={{padding:28}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div className="section-title" style={{fontSize:18}}>CONTROLE DE USUÁRIOS</div>
          <button className="btn btn-outline btn-sm" onClick={onClose}>✕</button>
        </div>
        <div style={{background:"#1E2330",border:"1px solid #2E3650",borderRadius:6,padding:16,marginBottom:16}}>
          <div style={{fontSize:10,fontWeight:700,color:"#C9A84C",letterSpacing:".1em",marginBottom:10}}>NOVO USUÁRIO</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px 14px",marginBottom:10}}>
            <div><label>Nome</label><input value={form.nome} onChange={e=>setForm(p=>({...p,nome:e.target.value}))} placeholder="Nome completo"/></div>
            <div><label>Login</label><input value={form.login} onChange={e=>setForm(p=>({...p,login:e.target.value}))} placeholder="login"/></div>
            <div><label>Senha</label><input type="password" value={form.pwd} onChange={e=>setForm(p=>({...p,pwd:e.target.value}))} placeholder="senha inicial"/></div>
            <div><label>Perfil</label>
              <select value={form.perfil} onChange={e=>setForm(p=>({...p,perfil:e.target.value}))}>
                <option value="admin">Administrador</option>
                <option value="gestor">Gestor</option>
                <option value="operador">Operador</option>
              </select>
            </div>
          </div>
          {err&&<div style={{color:"#E74C3C",fontSize:11,marginBottom:8}}>{err}</div>}
          <button className="btn btn-gold btn-sm" onClick={add} disabled={saving}>
            {saving?"Salvando...":"+ Adicionar Usuário"}
          </button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:280,overflowY:"auto"}}>
          {users.map(u=>(
            <div key={u.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#1E2330",borderRadius:4,padding:"10px 14px"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:13}}>{u.nome}</span>
                <span style={{fontSize:11,color:"#7A8299"}}>@{u.login}</span>
                <span className={perfilBadge(u.perfil)}>{perfilLabel(u.perfil)}</span>
                {u.id===currentUser.id&&<span style={{fontSize:10,color:"#7A8299"}}>(você)</span>}
              </div>
              <div style={{display:"flex",gap:6}}>
                <button className="btn btn-outline btn-sm" style={{fontSize:11}} onClick={()=>resetPwd(u)}>🔑 Senha</button>
                {u.id!==currentUser.id&&<button className="btn btn-danger" onClick={()=>remove(u)}>✕</button>}
              </div>
            </div>
          ))}
        </div>
        <div style={{marginTop:20,textAlign:"right"}}><button className="btn btn-gold" onClick={onClose}>Fechar</button></div>
      </div>
    </div>
  );
};

// ── BACKUP MODAL ──────────────────────────────────────────────────────
const BackupModal = ({onClose,showToast}) => {
  const [loading,setLoading] = useState(false);
  const [status,setStatus]   = useState("");
  const [counts,setCounts]   = useState(null);

  useEffect(()=>{
    const load = async ()=>{
      try {
        const [cads,fins,users,cfgDoc] = await Promise.all([
          db.collection("cadastros").get(),
          db.collection("financeiros").get(),
          db.collection("users").get(),
          db.collection("config").doc("app").get()
        ]);
        setCounts({
          cadastros: cads.size,
          financeiros: fins.size,
          users: users.size,
          config: cfgDoc.exists ? 1 : 0
        });
      } catch(e){ setStatus("Erro ao carregar contagens: "+e.message); }
    };
    load();
  },[]);

  const fetchAll = async () => {
    const [cads,fins,users,cfgDoc] = await Promise.all([
      db.collection("cadastros").get(),
      db.collection("financeiros").get(),
      db.collection("users").get(),
      db.collection("config").doc("app").get()
    ]);
    return {
      cadastros:   cads.docs.map(d=>({id:d.id,...d.data()})),
      financeiros: fins.docs.map(d=>({id:d.id,...d.data()})),
      users:       users.docs.map(d=>({id:d.id,...d.data(),pwd:"***"})),
      config:      cfgDoc.exists ? {id:"app",...cfgDoc.data()} : {}
    };
  };

  const backupJSON = async () => {
    setLoading(true); setStatus("Coletando dados...");
    try {
      const data = await fetchAll();
      const json = JSON.stringify({
        _backup_at: new Date().toISOString(),
        _version: "HP_SISTEMA_v4",
        ...data
      }, null, 2);
      const blob = new Blob([json],{type:"application/json"});
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href = url;
      a.download = `hp_sistema_backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      setStatus("✓ Backup JSON gerado com sucesso!");
      showToast("Backup JSON baixado!");
    } catch(e){ setStatus("Erro: "+e.message); }
    setLoading(false);
  };

  const backupXLSX = async () => {
    setLoading(true); setStatus("Coletando dados...");
    try {
      const data = await fetchAll();
      const wb = XLSX.utils.book_new();

      // Aba Operações (flatten lotes)
      const cadRows = [];
      data.cadastros.forEach(c=>{
        const lotes = c.lotes&&c.lotes.length>0 ? c.lotes : [{}];
        lotes.forEach(l=>{
          const cntrs = l.containers&&l.containers.length>0 ? l.containers : [{}];
          cntrs.forEach(cn=>{
            cadRows.push({
              "ID Operação": c.id_operacao||c.id,
              "Operação":    c.operacao||"",
              "Cliente":     c.cliente||"",
              "Data Op.":    c.data||"",
              "Incluído por":c.usuario_inclusao||"",
              "Lote":        l.codigo||"",
              "Data Lote":   l.data_lote||"",
              "CU%":         l.cu_pct||"",
              "AU-GR":       l.au_gr||"",
              "Peso (kg)":   l.peso||"",
              "Peso Seco":   l.peso_seco||"",
              "Umidade%":    l.umidade||"",
              "Valor CU":    l.valor_cu||"",
              "Valor AU":    l.valor_au||"",
              "Custo Lote":  l.custo_total||"",
              "Certificadora":l.certificadora||"",
              "Container":   cn.numero||"",
              "Gross Weight":cn.peso_bruto||"",
              "Net Weight":  cn.peso_liquido||"",
              "Obs Container":cn.obs||"",
              "Usuário Container":cn.usuario_inclusao||""
            });
          });
        });
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(cadRows), "Operações");

      // Aba Financeiros
      const finRows = data.financeiros.map(f=>({
        "Data":        f.data||"",
        "Cliente":     f.cliente||"",
        "Operação":    f.operacao||"",
        "Lote":        f.lote||"",
        "Valor (R$)":  f.valor||"",
        "Forma Pgto":  f.forma_pgto||"",
        "Observações": f.obs||"",
        "Incluído por":f.usuario_inclusao||""
      }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(finRows.length?finRows:[{}]), "Financeiros");

      // Aba Usuários (sem senha)
      const userRows = data.users.map(u=>({
        "Nome":   u.nome||"",
        "Login":  u.login||"",
        "Perfil": u.perfil||""
      }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(userRows.length?userRows:[{}]), "Usuários");

      const fname = `hp_sistema_backup_${new Date().toISOString().slice(0,10)}.xlsx`;
      XLSX.writeFile(wb, fname);
      setStatus("✓ Backup Excel gerado com sucesso!");
      showToast("Backup Excel baixado!");
    } catch(e){ setStatus("Erro: "+e.message); }
    setLoading(false);
  };

  const fmtCount = n => n===null?"...":n;

  return (
    <div className="modal-overlay">
      <div className="modal modal-sm slide-in" style={{padding:28,maxWidth:520}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div className="section-title" style={{fontSize:18}}>BACKUP DO SISTEMA</div>
          <button className="btn btn-outline btn-sm" onClick={onClose}>✕</button>
        </div>

        {/* Contagem de registros */}
        <div style={{background:"#1E2330",border:"1px solid #2E3650",borderRadius:6,padding:"14px 16px",marginBottom:20}}>
          <div style={{fontSize:10,fontWeight:700,color:"#C9A84C",letterSpacing:".1em",marginBottom:10}}>DADOS QUE SERÃO INCLUÍDOS</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 16px"}}>
            {[
              ["Operações",    counts?.cadastros],
              ["Recebimentos", counts?.financeiros],
              ["Usuários",     counts?.users],
              ["Configurações",counts?.config]
            ].map(([label,n])=>(
              <div key={label} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#161A23",borderRadius:4,padding:"6px 12px"}}>
                <span style={{fontSize:12,color:"#7A8299"}}>{label}</span>
                <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:13,color:"#C9A84C",fontWeight:600}}>{fmtCount(n)}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Botões */}
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
          <button className="btn btn-gold" onClick={backupJSON} disabled={loading} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            {loading?<span className="spinner" style={{width:14,height:14,borderWidth:2}}/>:"⬇"}
            Baixar Backup JSON
          </button>
          <button className="btn btn-green" onClick={backupXLSX} disabled={loading} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            {loading?<span className="spinner" style={{width:14,height:14,borderWidth:2}}/>:"⬇"}
            Baixar Backup Excel (.xlsx)
          </button>
        </div>

        {status&&(
          <div style={{background: status.startsWith("✓")?"rgba(46,204,113,.08)":"rgba(231,76,60,.08)",
            border:`1px solid ${status.startsWith("✓")?"rgba(46,204,113,.3)":"rgba(231,76,60,.3)"}`,
            borderRadius:4,padding:"8px 12px",fontSize:12,
            color:status.startsWith("✓")?"#2ECC71":"#E74C3C",
            fontFamily:"'IBM Plex Mono',monospace"}}>
            {status}
          </div>
        )}

        <div style={{marginTop:14,fontSize:11,color:"#7A8299",lineHeight:1.7}}>
          O arquivo será baixado diretamente para o seu dispositivo.<br/>
          JSON permite restauração futura. Excel é para consulta e auditoria.
        </div>

        <div style={{marginTop:16,textAlign:"right"}}>
          <button className="btn btn-outline" onClick={onClose}>Fechar</button>
        </div>
      </div>
    </div>
  );
};

// ── IMPORT XLSX MODAL ─────────────────────────────────────────────────
const ImportModal = ({type,onImport,onClose,certifiers}) => {
  const [preview,setPreview] = useState(null);
  const [error,setError]     = useState("");
  const fileRef = useRef();

  const CAD_COLS    = ["operacao","cliente","lote","cntr","data","cu_pct","au_gr","peso","peso_seco","valor_cu","valor_au","custo_total","certificadora","invoice"];
  const FIN_COLS    = ["data","cliente","lote","operacao","valor","forma_pgto","obs"];
  const CAD_HEADERS = ["Operação","Cliente","Lote","CNTR","Data","CU%","AU-GR","Peso","Peso Seco","Valor CU","Valor AU","Custo Total","Certificadora","Invoice"];
  const FIN_HEADERS = ["Data","Cliente","Lote","Operação","Valor","Forma Pgto","Observações"];
  const cols    = type==="cadastro" ? CAD_COLS    : FIN_COLS;
  const headers = type==="cadastro" ? CAD_HEADERS : FIN_HEADERS;

  const handleFile = e => {
    const file = e.target.files[0]; if(!file)return;
    setError(""); setPreview(null);
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        let rows = [];
        if(file.name.toLowerCase().endsWith(".csv")){
          const lines = ev.target.result.split(/\r?\n/).filter(l=>l.trim());
          if(lines.length<2){setError("Arquivo vazio.");return;}
          rows = lines.slice(1).map(l=>{
            const vals = l.split(/[,;]/).map(v=>v.trim().replace(/^"|"$/g,""));
            const obj = {};
            cols.forEach((c,i)=>{obj[c]=vals[i]||"";});
            return obj;
          });
        } else {
          const wb = XLSX.read(ev.target.result,{type:"array"});
          const ws = wb.Sheets[wb.SheetNames[0]];
          const data = XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
          if(data.length<2){setError("Planilha vazia.");return;}
          rows = data.slice(1).filter(r=>r.some(c=>c!=="")).map(r=>{
            const obj = {};
            cols.forEach((c,i)=>{
              let v = r[i]??"";
              if(c==="data"&&typeof v==="number"){v=new Date(Math.round((v-25569)*86400*1000)).toISOString().split("T")[0];}
              else if(v instanceof Date){v=v.toISOString().split("T")[0];}
              else{v=String(v).trim();}
              obj[c]=v;
            });
            if(type==="cadastro"){obj.custo_total=(parseFloat(obj.valor_cu)||0)+(parseFloat(obj.valor_au)||0);if(!obj.certificadora)obj.certificadora="ASA";}
            if(type==="financeiro"&&!obj.forma_pgto)obj.forma_pgto="PIX";
            return obj;
          });
        }
        if(!rows.length){setError("Nenhuma linha encontrada.");return;}
        setPreview(rows.slice(0,5));
        fileRef.current._rows = rows;
      } catch(err){ setError("Erro ao ler arquivo: "+err.message); }
    };
    if(file.name.toLowerCase().endsWith(".csv")) reader.readAsText(file,"UTF-8");
    else reader.readAsArrayBuffer(file);
  };

  const downloadTemplate = () => {
    const ws = XLSX.utils.aoa_to_sheet([headers]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Template");
    XLSX.writeFile(wb,`template_${type}.xlsx`);
  };

  const doImport = () => {
    if(!fileRef.current?._rows) return;
    onImport(fileRef.current._rows);
    onClose();
  };

  return (
    <div className="modal-overlay">
      <div className="modal slide-in" style={{maxWidth:700,padding:28}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div className="section-title" style={{fontSize:18}}>IMPORTAR PLANILHA — {type.toUpperCase()}</div>
          <button className="btn btn-outline btn-sm" onClick={onClose}>✕</button>
        </div>
        <div style={{background:"#1E2330",border:"1px solid #2E3650",borderRadius:6,padding:"12px 16px",marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:"#C9A84C",letterSpacing:".08em",marginBottom:8}}>ORDEM OBRIGATÓRIA DAS COLUNAS</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {headers.map((h,i)=>(
              <span key={h} style={{background:"#252B3B",border:"1px solid #2E3650",borderRadius:3,padding:"3px 8px",fontSize:11,fontFamily:"'IBM Plex Mono',monospace"}}>
                <span style={{color:"#7A8299"}}>{i+1}.</span> {h}
              </span>
            ))}
          </div>
          <button className="btn btn-outline btn-sm" onClick={downloadTemplate} style={{marginTop:10,fontSize:11}}>⬇ Baixar template .xlsx</button>
        </div>
        <div style={{marginBottom:12}}><label>Selecione o arquivo (.xlsx, .xls ou .csv)</label><input type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} ref={fileRef} style={{padding:"8px"}}/></div>
        {error&&<div style={{color:"#E74C3C",fontSize:12,fontFamily:"'IBM Plex Mono',monospace",marginBottom:10}}>{error}</div>}
        {preview&&(
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:"#7A8299",marginBottom:6}}>Pré-visualização (primeiras {preview.length} linhas) — Total: {fileRef.current?._rows?.length||0} linha(s)</div>
            <div style={{overflowX:"auto"}}>
              <table>
                <thead><tr>{headers.map(h=><th key={h}>{h}</th>)}</tr></thead>
                <tbody>{preview.map((r,i)=><tr key={i}>{cols.map(c=><td key={c} style={{color:"#E8ECF4"}}>{r[c]||"—"}</td>)}</tr>)}</tbody>
              </table>
            </div>
          </div>
        )}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button className="btn btn-outline" onClick={onClose}>Cancelar</button>
          <button className="btn btn-gold" onClick={doImport} disabled={!preview}>Importar {fileRef.current?._rows?.length||0} registros</button>
        </div>
      </div>
    </div>
  );
};

// Gera o ID da operação: 6 seq + 6 cliente + 8 data
const genOpId = (seq,cliente,data) => {
  const s = String(seq||1).padStart(6,"0");
  const c = (cliente||"").replace(/\s+/g,"").toUpperCase().substring(0,6).padEnd(6,"0");
  const d = (data||"").replace(/-/g,"").substring(0,8).padEnd(8,"0");
  return s+c+d;
};
// Peso do lote = soma dos Net Weight dos containers
const calcPeso    = l => l.containers.reduce((a,c)=>a+(parseFloat(c.peso_liquido)||0),0);
// Peso seco = peso * (1 - umidade/100)
const calcPesoSeco = l => { const p=calcPeso(l); const u=parseFloat(l.umidade)||0; return p*(1-u/100); };

const CadastroForm = ({initial,onSave,onCancel,certifiers,onManageCerts,saving,opSeq,currentUser}) => {
  const [op,setOp] = useState(initial
    ? {operacao:initial.operacao||"",cliente:initial.cliente||"",data:initial.data||today(),id_operacao:initial.id_operacao||""}
    : {operacao:"",cliente:"",data:today(),id_operacao:""});
  const [lotes,setLotes]       = useState(initial?.lotes?.length ? initial.lotes : []);
  const [selId,setSelId]       = useState(null);
  const [loteTab,setLoteTab]   = useState("dados");
  const [editLId,setEditLId]   = useState(null);
  const [editLBuf,setEditLBuf] = useState(null);
  const [addCntr,setAddCntr]   = useState(false);
  const [newCntr,setNewCntr]   = useState(emptyCntr());
  const [editCId,setEditCId]   = useState(null);
  const [editCBuf,setEditCBuf] = useState(null);

  // ── AUTO-SAVE ──────────────────────────────────────────────────────
  const [autoStatus,setAutoStatus] = useState(null); // null | "saving" | "saved" | "error"
  const [lastSaved,setLastSaved]   = useState(null);
  const [rascunhoId,setRascunhoId] = useState(initial?.id||null);
  const opRef  = useRef(op);
  const lotRef = useRef(lotes);
  useEffect(()=>{ opRef.current=op; },[op]);
  useEffect(()=>{ lotRef.current=lotes; },[lotes]);

  const doAutoSave = useCallback(async()=>{
    if(!FB_READY||!db) return;
    setAutoStatus("saving");
    try {
      const o = opRef.current;
      const ls = lotRef.current;
      const lotesCalc = ls.map(l=>({...l,peso:calcPeso(l).toFixed(3),peso_seco:calcPesoSeco(l).toFixed(3)}));
      const data = {
        ...o, lotes:lotesCalc,
        custo_total: ls.reduce((a,l)=>a+(parseFloat(l.custo_total)||0),0),
        _rascunho:true, _user:currentUser?.id||"",
        _savedAt: new Date().toISOString()
      };
      if(rascunhoId){
        await db.collection("rascunhos").doc(rascunhoId).set(data,{merge:true});
      } else {
        const ref = await db.collection("rascunhos").add(data);
        setRascunhoId(ref.id);
      }
      setLastSaved(new Date());
      setAutoStatus("saved");
    } catch(e){
      setAutoStatus("error");
    }
  },[rascunhoId,currentUser]);

  // Salva a cada 30 segundos
  useEffect(()=>{
    const t = setInterval(doAutoSave, 30000);
    return ()=>clearInterval(t);
  },[doAutoSave]);

  // Salva também quando componente desmonta (fecha sem finalizar)
  useEffect(()=>{
    return ()=>{ doAutoSave(); };
  },[]);

  const deleteRascunho = async(id)=>{
    if(id&&FB_READY&&db){
      try{ await db.collection("rascunhos").doc(id).delete(); }catch(_){}
    }
  };

  // Auto-gerar ID ao mudar cliente ou data (só em nova operação)
  useEffect(()=>{
    if(!initial?.id) setOp(p=>({...p,id_operacao:genOpId(opSeq,p.cliente,p.data)}));
  },[op.cliente,op.data]);

  const selLote = lotes.find(l=>l.id===selId)||null;
  const isEditL = editLId===selId;
  const loteView = isEditL ? editLBuf : selLote;
  const canDeleteCntr = currentUser?.perfil==="admin";

  // ── Lote CRUD ──
  const startEditL = l => { setEditLId(l.id); setEditLBuf({...l}); };
  const cancelEditL = () => { setEditLId(null); setEditLBuf(null); };
  const saveEditL = () => {
    if(!editLBuf.codigo||!editLBuf.codigo.trim()){
      alert("Informe o Código do Lote antes de salvar.");return;
    }
    setLotes(ls=>ls.map(l=>l.id===editLId?{...editLBuf,id:editLId}:l));
    setEditLId(null); setEditLBuf(null);
  };
  const upBuf = (k,v) => setEditLBuf(p=>{
    const u={...p,[k]:v};
    if(k==="valor_cu"||k==="valor_au"){
      u.custo_total=(k==="valor_cu"?parseFloat(v)||0:parseFloat(p.valor_cu)||0)+(k==="valor_au"?parseFloat(v)||0:parseFloat(p.valor_au)||0);
    }
    return u;
  });
  const addLote = () => {
    const l={...emptyLote(), usuario_inclusao: currentUser?.nome||""};
    setLotes(ls=>[...ls,l]);
    setSelId(l.id);
    setLoteTab("dados");
    startEditL(l);
  };
  const delLote = id => {
    if(!confirm("Excluir este lote?"))return;
    setLotes(ls=>ls.filter(l=>l.id!==id));
    if(selId===id){ setSelId(lotes.find(l=>l.id!==id)?.id||null); cancelEditL(); }
  };

  // ── Container CRUD ──
  const saveCntr = () => {
    if(!newCntr.numero.trim()){
      alert("Informe a Identificação do container antes de salvar.");return;
    }
    const cntrComUser = {...newCntr, usuario_inclusao: currentUser?.nome||""};
    setLotes(ls=>ls.map(l=>l.id===selId?{...l,containers:[...l.containers,cntrComUser]}:l));
    setNewCntr(emptyCntr()); setAddCntr(false);
  };
  const startEditC = c => { setEditCId(c.id); setEditCBuf({...c}); };
  const cancelEditC = () => { setEditCId(null); setEditCBuf(null); };
  const saveEditC = () => {
    if(!editCBuf.numero||!editCBuf.numero.trim()){
      alert("Informe a Identificação do container antes de salvar.");return;
    }
    setLotes(ls=>ls.map(l=>l.id!==selId?l:{...l,containers:l.containers.map(c=>c.id===editCId?editCBuf:c)}));
    setEditCId(null); setEditCBuf(null);
  };
  const delCntr = cid => setLotes(ls=>ls.map(l=>l.id===selId?{...l,containers:l.containers.filter(c=>c.id!==cid)}:l));

  const totalOp = lotes.reduce((a,l)=>a+(parseFloat(l.custo_total)||0),0);

  const handleSave = () => {
    if(!op.operacao.trim()){alert("Informe a identificação da operação.");return;}
    const lotesCalc = lotes.map(l=>({...l,peso:calcPeso(l).toFixed(3),peso_seco:calcPesoSeco(l).toFixed(3)}));
    deleteRascunho(rascunhoId);
    onSave({...op,lotes:lotesCalc,custo_total:totalOp});
  };

  const handleCancel = () => {
    if(lotes.length>0||op.operacao){
      if(confirm("Cancelar operação? O rascunho salvo automaticamente será mantido no Firebase e pode ser recuperado mais tarde.")){
        onCancel();
      }
    } else {
      deleteRascunho(rascunhoId);
      onCancel();
    }
  };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      {/* TOP BAR */}
      <div style={{padding:"14px 22px",borderBottom:"1px solid #2E3650",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div>
          <div className="section-title" style={{fontSize:18}}>{initial?.id?"EDITAR OPERAÇÃO":"NOVA OPERAÇÃO"}</div>
          {op.id_operacao&&<div style={{fontSize:11,color:"#7A8299",fontFamily:"'IBM Plex Mono',monospace",marginTop:2}}>ID: <span style={{color:"#C9A84C"}}>{op.id_operacao}</span></div>}
          {initial?.usuario_inclusao&&<div style={{fontSize:10,color:"#7A8299",marginTop:2}}>Incluído por: <span style={{color:"#E8ECF4"}}>{initial.usuario_inclusao}</span></div>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {/* Indicador de auto-save */}
          <div style={{fontSize:11,fontFamily:"'IBM Plex Mono',monospace",display:"flex",alignItems:"center",gap:6}}>
            {autoStatus==="saving"&&<><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:"#C9A84C",animation:"spin .7s linear infinite"}}/>
              <span style={{color:"#C9A84C"}}>Salvando rascunho...</span></>}
            {autoStatus==="saved"&&<><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:"#2ECC71"}}/>
              <span style={{color:"#7A8299"}}>Rascunho salvo {lastSaved?lastSaved.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}):""}</span></>}
            {autoStatus==="error"&&<><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:"#E74C3C"}}/>
              <span style={{color:"#E74C3C"}}>Erro ao salvar rascunho</span></>}
            {!autoStatus&&<span style={{color:"#7A8299",fontSize:10}}>Auto-save: 30s</span>}
          </div>
          <button className="btn btn-outline btn-sm" onClick={handleCancel}>Cancelar</button>
          <button className="btn btn-gold btn-sm" onClick={handleSave} disabled={saving}>{saving?"Salvando...":"Finalizar Operação"}</button>
        </div>
      </div>

      {/* CABEÇALHO */}
      <div style={{padding:"14px 22px",borderBottom:"1px solid #2E3650",background:"rgba(30,35,48,.5)",flexShrink:0}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 2fr 200px",gap:"10px 14px"}}>
          <FG label="Identificação da Operação"><input value={op.operacao} onChange={e=>setOp(p=>({...p,operacao:e.target.value.toUpperCase()}))} placeholder="Ex: LOTE 1 MING"/></FG>
          <FG label="Cliente"><input value={op.cliente} onChange={e=>setOp(p=>({...p,cliente:e.target.value}))} placeholder="Nome do cliente"/></FG>
          <FG label="Data">
            <input type="date" value={op.data}
              onChange={e=>setOp(p=>({...p,data:e.target.value}))}
              onBlur={e=>{const v=e.target.value;if(v)setOp(p=>({...p,data:v}));}}
              style={{cursor:"pointer"}}/>
          </FG>
        </div>
      </div>

      {/* BODY */}
      <div style={{display:"flex",flex:1,minHeight:0,overflow:"hidden"}}>

        {/* LISTA DE LOTES */}
        <div style={{width:260,borderRight:"1px solid #2E3650",display:"flex",flexDirection:"column",flexShrink:0}}>
          <div style={{padding:"10px 14px",borderBottom:"1px solid #2E3650",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:".1em",color:"#C9A84C",textTransform:"uppercase"}}>Lotes <span style={{color:"#7A8299",fontWeight:400}}>({lotes.length})</span></div>
            <button className="btn btn-gold btn-sm" style={{padding:"4px 10px",fontSize:11}} onClick={addLote}>+ Novo</button>
          </div>
          <div style={{flex:1,overflowY:"auto"}}>
            {lotes.length===0&&<div style={{padding:"24px 14px",textAlign:"center",color:"#7A8299",fontSize:12,lineHeight:1.7}}>Nenhum lote.<br/>Clique em + Novo.</div>}
            {lotes.map(l=>{
              const pesoL=calcPeso(l);
              const isSelL=l.id===selId;
              return (
              <div key={l.id} onClick={()=>{setSelId(l.id);if(editLId!==l.id){cancelEditL();}}}
                style={{padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid #2E3650",
                  background:isSelL?"rgba(201,168,76,.08)":"transparent",
                  borderLeft:isSelL?"3px solid #C9A84C":"3px solid transparent",transition:"all .12s"}}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:6}}>
                  <div style={{minWidth:0,flex:1}}>
                    <div style={{fontSize:12,fontWeight:600,color:isSelL?"#C9A84C":"#E8ECF4",fontFamily:"'IBM Plex Mono',monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {l.codigo||<span style={{color:"#7A8299",fontStyle:"italic",fontWeight:400}}>Sem código</span>}
                    </div>
                    <div style={{fontSize:10,color:"#7A8299",marginTop:2}}>{l.containers.length} container(s) · {pesoL>0?fmt(pesoL)+" kg":"—"}</div>
                    <div style={{fontSize:11,color:"#2ECC71",fontFamily:"'IBM Plex Mono',monospace",marginTop:2}}>{l.custo_total>0?fmtCur(l.custo_total):"—"}</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
                    <button className="btn btn-outline btn-sm" style={{padding:"2px 8px",fontSize:10}}
                      onClick={e=>{e.stopPropagation();setSelId(l.id);startEditL(l);setLoteTab("dados");}}>✎ Editar</button>
                    {canDeleteCntr&&<button className="btn btn-danger" style={{padding:"2px 8px",fontSize:10}}
                      onClick={e=>{e.stopPropagation();delLote(l.id);}}>✕</button>}
                  </div>
                </div>
              </div>
            );})}
          </div>
          <div style={{padding:"10px 14px",borderTop:"1px solid #2E3650",background:"#1E2330",flexShrink:0}}>
            <div style={{fontSize:10,letterSpacing:".08em",color:"#7A8299",textTransform:"uppercase",marginBottom:2}}>Custo total da operação</div>
            <div style={{fontSize:16,fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,color:"#C9A84C"}}>{fmtCur(totalOp)}</div>
          </div>
        </div>

        {/* DETALHE DO LOTE */}
        <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column"}}>
          {!selLote ? (
            <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,color:"#7A8299"}}>
              <div style={{fontSize:40,opacity:.2}}>◈</div>
              <div style={{fontSize:13}}>Selecione um lote ou crie um novo</div>
              <button className="btn btn-gold btn-sm" onClick={addLote}>+ Novo Lote</button>
            </div>
          ) : (
            <>
              {/* ABAS */}
              <div style={{borderBottom:"1px solid #2E3650",display:"flex",padding:"0 20px",flexShrink:0,background:"rgba(30,35,48,.4)",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex"}}>
                  {[["dados","DADOS DO LOTE"],["containers","CONTAINERS"+(selLote.containers.length>0?" ("+selLote.containers.length+")":"")]].map(([k,label])=>(
                    <button key={k} onClick={()=>setLoteTab(k)}
                      style={{background:"transparent",border:"none",borderBottom:loteTab===k?"2px solid #C9A84C":"2px solid transparent",
                        color:loteTab===k?"#C9A84C":"#7A8299",padding:"10px 16px",fontSize:11,fontWeight:700,letterSpacing:".08em",cursor:"pointer"}}>
                      {label}
                    </button>
                  ))}
                </div>
                {/* Badge modo edição / visualização */}
                {loteTab==="dados"&&(
                  isEditL
                    ? <div style={{display:"flex",gap:6}}>
                        <button className="btn btn-outline btn-sm" style={{fontSize:10}} onClick={cancelEditL}>Cancelar</button>
                        <button className="btn btn-gold btn-sm" style={{fontSize:10}} onClick={saveEditL}>💾 Salvar Lote</button>
                      </div>
                    : <div style={{fontSize:10,color:"#7A8299",padding:"0 4px"}}>Clique em <strong style={{color:"#C9A84C"}}>✎ Editar</strong> para alterar</div>
                )}
              </div>

              {/* ABA DADOS DO LOTE */}
              {loteTab==="dados"&&loteView&&(()=>{
                const peso    = calcPeso(selLote);
                const pesoSeco= calcPesoSeco({...selLote,umidade:isEditL?editLBuf.umidade:selLote.umidade});
                return (
                <div style={{padding:"18px 22px"}}>
                  {/* Identificação */}
                  <div style={{marginBottom:12}}>
                    <div style={{fontSize:10,fontWeight:700,letterSpacing:".12em",color:"#7A8299",textTransform:"uppercase",marginBottom:8}}>IDENTIFICAÇÃO DO LOTE</div>
                    {isEditL
                      ? <Grid cols={2} style={{maxWidth:480}}>
                          <FG label="Código do Lote"><input value={editLBuf.codigo} onChange={e=>upBuf("codigo",e.target.value.toUpperCase())} placeholder="Ex: GR008" autoFocus/></FG>
                          <FG label="Data do Lote"><input type="date" value={editLBuf.data_lote||""} onChange={e=>upBuf("data_lote",e.target.value)}/></FG>
                        </Grid>
                      : <div style={{display:"flex",gap:24,fontFamily:"'IBM Plex Mono',monospace",fontSize:13,flexWrap:"wrap"}}>
                          <span><span style={{color:"#7A8299",fontSize:10}}>CÓDIGO: </span><span style={{color:"#C9A84C"}}>{selLote.codigo||"—"}</span></span>
                          <span><span style={{color:"#7A8299",fontSize:10}}>DATA: </span>{selLote.data_lote||"—"}</span>
                          {selLote.usuario_inclusao&&<span><span style={{color:"#7A8299",fontSize:10}}>INCLUÍDO POR: </span><span style={{color:"#E8ECF4"}}>{selLote.usuario_inclusao}</span></span>}
                        </div>
                    }
                  </div>
                  <div className="divider"/>
                  {/* CU */}
                  <div style={{marginBottom:12}}>
                    <div style={{fontSize:10,fontWeight:700,letterSpacing:".12em",color:"#7A8299",textTransform:"uppercase",marginBottom:8}}>COBRE (CU)</div>
                    {isEditL
                      ? <Grid cols={4}>
                          <FG label="CU %"><input type="number" step="0.0001" value={editLBuf.cu_pct} onChange={e=>upBuf("cu_pct",e.target.value)} placeholder="0.0000"/></FG>
                          <FG label="CERT – CU %"><input type="number" step="0.0001" value={editLBuf.cert_cu_pct} onChange={e=>upBuf("cert_cu_pct",e.target.value)} placeholder="0.0000"/></FG>
                          <FG label="Valor Ponto CU"><input type="number" step="0.01" value={editLBuf.vl_ponto_cu} onChange={e=>upBuf("vl_ponto_cu",e.target.value)} placeholder="0.00"/></FG>
                          <FG label="Valor CU (R$)"><input type="number" step="0.01" value={editLBuf.valor_cu} onChange={e=>upBuf("valor_cu",e.target.value)} placeholder="0.00"/></FG>
                        </Grid>
                      : <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"6px 14px",fontFamily:"'IBM Plex Mono',monospace",fontSize:12}}>
                          {[["CU %",fmtPct(selLote.cu_pct)],["CERT CU %",fmtPct(selLote.cert_cu_pct)],["Ponto CU",fmtCur(selLote.vl_ponto_cu)],["Valor CU",fmtCur(selLote.valor_cu)]].map(([k,v])=>
                            <div key={k}><div style={{fontSize:9,color:"#7A8299",marginBottom:2}}>{k}</div><div style={{color:"#C9A84C"}}>{v}</div></div>)}
                        </div>
                    }
                  </div>
                  <div className="divider"/>
                  {/* AU */}
                  <div style={{marginBottom:12}}>
                    <div style={{fontSize:10,fontWeight:700,letterSpacing:".12em",color:"#7A8299",textTransform:"uppercase",marginBottom:8}}>OURO (AU)</div>
                    {isEditL
                      ? <Grid cols={4}>
                          <FG label="AU – GR"><input type="number" step="0.0001" value={editLBuf.au_gr} onChange={e=>upBuf("au_gr",e.target.value)} placeholder="0.0000"/></FG>
                          <FG label="CERT – AU"><input type="number" step="0.0001" value={editLBuf.cert_au} onChange={e=>upBuf("cert_au",e.target.value)} placeholder="0.0000"/></FG>
                          <FG label="Ponto AU – GR"><input type="number" step="0.01" value={editLBuf.ponto_au} onChange={e=>upBuf("ponto_au",e.target.value)} placeholder="0.00"/></FG>
                          <FG label="Valor AU (R$)"><input type="number" step="0.01" value={editLBuf.valor_au} onChange={e=>upBuf("valor_au",e.target.value)} placeholder="0.00"/></FG>
                        </Grid>
                      : <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"6px 14px",fontFamily:"'IBM Plex Mono',monospace",fontSize:12}}>
                          {[["AU GR",fmt(selLote.au_gr)],["CERT AU",fmt(selLote.cert_au)],["Ponto AU",fmtCur(selLote.ponto_au)],["Valor AU",fmtCur(selLote.valor_au)]].map(([k,v])=>
                            <div key={k}><div style={{fontSize:9,color:"#7A8299",marginBottom:2}}>{k}</div><div style={{color:"#C9A84C"}}>{v}</div></div>)}
                        </div>
                    }
                  </div>
                  <div className="divider"/>
                  {/* PESO & CERT */}
                  <div style={{marginBottom:14}}>
                    <div style={{fontSize:10,fontWeight:700,letterSpacing:".12em",color:"#7A8299",textTransform:"uppercase",marginBottom:8}}>PESO & CERTIFICAÇÃO</div>
                    {isEditL
                      ? <Grid cols={4}>
                          {/* Peso kg — readonly, calculado dos containers */}
                          <FG label="Peso (kg) — auto">
                            <input type="number" value={peso.toFixed(3)} readOnly
                              style={{background:"rgba(30,35,48,.8)",color:"#7A8299",cursor:"not-allowed"}}
                              title="Calculado automaticamente pela soma de Net Weight dos containers"/>
                          </FG>
                          <FG label="Umidade %"><input type="number" step="0.01" value={editLBuf.umidade} onChange={e=>upBuf("umidade",e.target.value)} placeholder="0.00"/></FG>
                          {/* Peso Seco — readonly, calculado */}
                          <FG label="Peso Seco (kg) — auto">
                            <input type="number" value={pesoSeco.toFixed(3)} readOnly
                              style={{background:"rgba(30,35,48,.8)",color:"#7A8299",cursor:"not-allowed"}}
                              title="Peso × (1 − Umidade%)"/>
                          </FG>
                          <FG label={<span style={{display:"flex",alignItems:"center",gap:6}}>Certificadora<button onClick={onManageCerts} style={{background:"none",border:"none",color:"#C9A84C",cursor:"pointer",fontSize:10}}>+ Gerenciar</button></span>}>
                            <select value={editLBuf.certificadora} onChange={e=>upBuf("certificadora",e.target.value)}>{certifiers.map(c=><option key={c}>{c}</option>)}</select>
                          </FG>
                        </Grid>
                      : <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"6px 14px",fontFamily:"'IBM Plex Mono',monospace",fontSize:12}}>
                          {[["Peso (kg)",fmt(peso)],["Umidade %",selLote.umidade?selLote.umidade+"%":"—"],["Peso Seco (kg)",fmt(pesoSeco)],["Certificadora",selLote.certificadora||"—"]].map(([k,v])=>
                            <div key={k}><div style={{fontSize:9,color:"#7A8299",marginBottom:2}}>{k}</div><div style={{color:"#E8ECF4"}}>{v}</div></div>)}
                        </div>
                    }
                  </div>
                  <div style={{background:"#1E2330",border:"1px solid #2E3650",borderRadius:6,padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div>

                    </div>
                    <div style={{fontSize:11,color:"#7A8299"}}>CU + AU</div>
                  </div>

                        <FG label="Identificação"><input value={newCntr.numero} onChange={e=>setNewCntr(p=>({...p,numero:e.target.value.toUpperCase()}))} placeholder="Ex: CONT001" autoFocus/></FG>
                        <FG label="Gross Weight (kg)"><input type="number" step="0.001" value={newCntr.peso_bruto} onChange={e=>setNewCntr(p=>({...p,peso_bruto:e.target.value}))} placeholder="0.000"/></FG>
                        <FG label="Net Weight (kg)"><input type="number" step="0.001" value={newCntr.peso_liquido} onChange={e=>setNewCntr(p=>({...p,peso_liquido:e.target.value}))} placeholder="0.000"/></FG>
                        <FG label="Observações"><input value={newCntr.obs} onChange={e=>setNewCntr(p=>({...p,obs:e.target.value}))} placeholder="Opcional"/></FG>

                      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:10}}>

                        <button className="btn btn-gold btn-sm" onClick={saveCntr}>Salvar Container</button>

                    </div>

                  {selLote.containers.length===0&&!addCntr&&(
                    <div style={{textAlign:"center",color:"#7A8299",padding:"32px 0",fontSize:12}}>Nenhum container. Clique em "+ Adicionar Container".</div>

                  {selLote.containers.length>0&&(
                    <>
                      <table>
                        <thead><tr><th>#</th><th>Identificação</th><th>Gross Weight (kg)</th><th>Net Weight (kg)</th><th>Observações</th><th>Incluído por</th><th style={{textAlign:"center",minWidth:110}}>Ações</th></tr></thead>
                        <tbody>
                          {selLote.containers.map((c,i)=>(
                            editCId===c.id
                            ? <tr key={c.id} style={{background:"rgba(201,168,76,.05)"}}>
                                <td className="text-muted">{i+1}</td>
                                <td><input value={editCBuf.numero} onChange={e=>setEditCBuf(p=>({...p,numero:e.target.value.toUpperCase()}))} style={{padding:"4px 8px",fontSize:12,minWidth:80}} autoFocus/></td>
                                <td><input type="number" step="0.001" value={editCBuf.peso_bruto} onChange={e=>setEditCBuf(p=>({...p,peso_bruto:e.target.value}))} style={{padding:"4px 8px",fontSize:12,minWidth:80}}/></td>
                                <td><input type="number" step="0.001" value={editCBuf.peso_liquido} onChange={e=>setEditCBuf(p=>({...p,peso_liquido:e.target.value}))} style={{padding:"4px 8px",fontSize:12,minWidth:80}}/></td>
                                <td><input value={editCBuf.obs} onChange={e=>setEditCBuf(p=>({...p,obs:e.target.value}))} style={{padding:"4px 8px",fontSize:12,minWidth:80}}/></td>
