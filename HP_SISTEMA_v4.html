};

// ── FORM FINANCEIRO ───────────────────────────────────────────────────
const emptyFin = () => ({data:today(),lote:"",operacao:"",cliente:"",valor:"",forma_pgto:"PIX",obs:""});
const FinanceiroForm = ({initial,onSave,onCancel,cadastros,saving}) => {
  const [f,setF] = useState(initial||emptyFin());
  const s = (k,v) => setF(p=>({...p,[k]:v}));

  // Lista de clientes únicos
  const clientes = [...new Set(cadastros.map(c=>c.cliente).filter(Boolean))].sort();

  // Operações filtradas pelo cliente selecionado
  const opsDoCliente = f.cliente
    ? [...new Set(cadastros.filter(c=>c.cliente===f.cliente).map(c=>c.operacao).filter(Boolean))].sort()
    : [...new Set(cadastros.map(c=>c.operacao).filter(Boolean))].sort();

  // Lotes filtrados pela operação selecionada (dentro do cliente)
  const lotesDisponiveis = f.operacao
    ? [...new Set(
        cadastros
          .filter(c=>(!f.cliente||c.cliente===f.cliente) && c.operacao===f.operacao)
          .flatMap(c=>c.lotes?.map(l=>l.codigo)||[c.lote])
          .filter(Boolean)
      )].sort()
    : [];

  // Ao trocar cliente, limpar operação e lote dependentes
  const onCliente = v => setF(p=>({...p,cliente:v,operacao:"",lote:""}));
  // Ao trocar operação, limpar lote dependente
  const onOperacao = v => setF(p=>({...p,operacao:v,lote:""}));

  return (
    <div style={{padding:28}}>
      <div style={{marginBottom:20}}><div className="section-title">{initial?.id?"EDITAR RECEBIMENTO":"NOVO RECEBIMENTO"}</div></div>
      <div className="divider"/>
      <Grid cols={3} style={{marginBottom:16}}>

        {/* Linha 1: Data | Cliente | Operação */}
        <FG label="Data">
          <input type="date" value={f.data} onChange={e=>s("data",e.target.value)}/>
        </FG>
        <FG label="Cliente">
          <select value={f.cliente} onChange={e=>onCliente(e.target.value)}
            style={{color:f.cliente?"#E8ECF4":"#7A8299"}}>
            <option value="">Selecione o cliente...</option>
            {clientes.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </FG>
        <FG label="Operação">
          <select value={f.operacao} onChange={e=>onOperacao(e.target.value)}
            disabled={!f.cliente}
            style={{color:f.operacao?"#E8ECF4":"#7A8299",opacity:f.cliente?1:.6}}>
            <option value="">{f.cliente?"Selecione a operação...":"— selecione o cliente primeiro —"}</option>
            {opsDoCliente.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        </FG>

        {/* Linha 2: Lote | Valor | Forma Pgto */}
        <FG label="Lote">
          <select value={f.lote} onChange={e=>s("lote",e.target.value)}
            disabled={!f.operacao}
            style={{color:f.lote?"#E8ECF4":"#7A8299",opacity:f.operacao?1:.6}}>
            <option value="">{f.operacao?"Selecione o lote...":"— selecione a operação primeiro —"}</option>
            {lotesDisponiveis.map(l=><option key={l} value={l}>{l}</option>)}
          </select>
        </FG>
        <FG label="Valor (R$)">
          <input type="number" step="0.01" value={f.valor} onChange={e=>s("valor",e.target.value)} placeholder="0.00"/>
        </FG>
        <FG label="Forma de Pagamento">
          <select value={f.forma_pgto} onChange={e=>s("forma_pgto",e.target.value)}>
            {DEFAULT_PAYMENT.map(p=><option key={p}>{p}</option>)}
          </select>
        </FG>

        {/* Linha 3: Observações */}
        <div style={{gridColumn:"span 3"}}>
          <FG label="Observações">
            <textarea rows={2} value={f.obs} onChange={e=>s("obs",e.target.value)} placeholder="Observações..." style={{resize:"vertical"}}/>
          </FG>
        </div>
      </Grid>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <button className="btn btn-outline" onClick={onCancel}>Cancelar</button>
        <button className="btn btn-gold" onClick={()=>onSave(f)} disabled={saving}>
          {saving?"Salvando...":(initial?.id?"Salvar Alterações":"Registrar Recebimento")}
        </button>
      </div>
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  APP PRINCIPAL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function App() {
  // ── AUTH ────────────────────────────────────────────────────────────
  const [currentUser,setCurrentUser] = useState(null);
  const [authChecked,setAuthChecked] = useState(false);
  const [showUserMgr,setShowUserMgr] = useState(false);
  const [showBackup,setShowBackup]   = useState(false);
  const isAdmin    = currentUser?.perfil==="admin";
  const isGestor   = currentUser?.perfil==="gestor";
  const isOperador = currentUser?.perfil==="operador";
  const canDelete  = isAdmin;
  const canImport  = isAdmin;

  // ── DATA ────────────────────────────────────────────────────────────
  const [cadastros,setCadastros]     = useState([]);
  const [financeiros,setFinanceiros] = useState([]);
  const [certifiers,setCertifiers]   = useState(DEFAULT_CERTIFIERS);
  const [dataReady,setDataReady]     = useState(false);

  // ── UI STATE ────────────────────────────────────────────────────────
  const [tab,setTab] = useState("dashboard");
  // Redireciona para a primeira aba permitida se o perfil não tiver acesso à aba atual
  useEffect(()=>{
    if(!currentUser) return;
    const allowed = tabsForPerfil(currentUser.perfil).map(t=>t.id);
    if(!allowed.includes(tab)) setTab(allowed[0]||"dashboard");
  },[currentUser,tab]);
  const [showCadForm,setShowCadForm]   = useState(false);
  const [editCad,setEditCad]           = useState(null);
  const [showFinForm,setShowFinForm]   = useState(false);
  const [editFin,setEditFin]           = useState(null);
  const [showCertMgr,setShowCertMgr]   = useState(false);
  const [showImportCad,setShowImportCad] = useState(false);
  const [showImportFin,setShowImportFin] = useState(false);
  const [saving,setSaving]             = useState(false);
  const [rascunhos,setRascunhos]       = useState([]);
  const [cadFilters,setCadFilters]     = useState({operacao:"",cliente:"",lote:"",data:""});
  const [finFilters,setFinFilters]     = useState({operacao:"",cliente:"",lote:"",data:""});
  const [relOpF,setRelOpF]             = useState({lote:"",operacao:"",data_ini:"",data_fim:""});
  const [relFinF,setRelFinF]           = useState({cliente:"",operacao:"",data_ini:"",data_fim:""});
  const [toast,setToast]               = useState(null);

  const showToast = (msg,type="success") => setToast({msg,type});

  // ── SEED DEFAULT USERS IF EMPTY ─────────────────────────────────────
  const seedUsers = async () => {
    const snap = await db.collection("users").limit(1).get();
    if(snap.empty){
      for(const u of DEFAULT_USERS){
        await db.collection("users").add(u);
      }
    }
  };

  // ── LOAD SESSION + SEED ─────────────────────────────────────────────
  useEffect(()=>{
    if(!FB_READY){setAuthChecked(true);return;}
    seedUsers().then(()=>{
      const sess = LS.get("hp:session",null);
      if(sess){
        // re-validate session against Firestore
        db.collection("users").doc(sess.id).get().then(d=>{
          if(d.exists){setCurrentUser({...d.data(),id:d.id});}
          else{LS.set("hp:session",null);}
          setAuthChecked(true);
        }).catch(()=>setAuthChecked(true));
      } else {
        setAuthChecked(true);
      }
    }).catch(()=>setAuthChecked(true));
  },[]);

  // ── REAL-TIME LISTENERS ─────────────────────────────────────────────
  useEffect(()=>{
    if(!currentUser||!FB_READY)return;
    setDataReady(false);
    const unsubs = [];

    unsubs.push(FS.onSnap("cadastros", setCadastros));
    unsubs.push(FS.onSnap("financeiros", setFinanceiros));
    // Rascunhos do usuário atual
    const unsubR = db.collection("rascunhos")
      .where("_user","==",currentUser.id||"")
      .onSnapshot(snap=>{
        setRascunhos(snap.docs.map(d=>({...d.data(),id:d.id})));
      });
    unsubs.push(unsubR);

    // Load config (not real-time, but reload on mount)
    db.collection("config").doc("app").get().then(d=>{
      if(d.exists){
        const cfg = d.data();
        if(cfg.certifiers) setCertifiers(cfg.certifiers);
      }
      setDataReady(true);
    }).catch(()=>setDataReady(true));

    return ()=>unsubs.forEach(u=>u());
  },[currentUser]);

  // ── SAVE CONFIG ──────────────────────────────────────────────────────
  const saveConfig = async (certs) => {
    await FS.set("config","app",{certifiers:certs});
  };

  const updateCertifiers = async (list) => {
    setCertifiers(list);
    await saveConfig(list);
    showToast("Certificadoras salvas!");
    setShowCertMgr(false);
  };

  // ── CRUD CADASTRO ────────────────────────────────────────────────────
  const saveCad = async (d) => {
    setSaving(true);
    try {
      const lotesComUser = (d.lotes||[]).map(l=>({
        ...l,
        usuario_inclusao: l.usuario_inclusao || currentUser.nome,
        containers: (l.containers||[]).map(c=>({
          ...c,
          usuario_inclusao: c.usuario_inclusao || currentUser.nome
        }))
      }));
      const data = {
        operacao: d.operacao||"",
        cliente:  d.cliente||"",
        data:     d.data||today(),
        id_operacao: d.id_operacao||"",
        lotes:    lotesComUser,
        custo_total: d.custo_total||0,
        usuario_inclusao: editCad?.usuario_inclusao || currentUser.nome
      };
      if(editCad?.id) await FS.update("cadastros", editCad.id, data);
      else             await FS.add("cadastros", data);
      setShowCadForm(false); setEditCad(null);
      showToast("Operação salva!");
    } catch(e){ showToast("Erro ao salvar: "+e.message,"error"); }
    setSaving(false);
  };

  const delCad = async (id) => {
    if(!confirm("Excluir operação?"))return;
    await FS.del("cadastros",id);
    showToast("Operação excluída.","info");
  };

  const importCadRows = async (rows) => {
    showToast("Importando "+rows.length+" registros...","info");
    for(const r of rows){ await FS.add("cadastros", r); }
    showToast(rows.length+" operações importadas!");
  };

  // ── CRUD FINANCEIRO ──────────────────────────────────────────────────
  const saveFin = async (d) => {
    setSaving(true);
    try {
      const data = {...d, usuario_inclusao: editFin?.usuario_inclusao || currentUser.nome};
      if(editFin?.id) await FS.update("financeiros", editFin.id, data);
      else             await FS.add("financeiros", data);
      setShowFinForm(false); setEditFin(null);
      showToast("Recebimento salvo!");
    } catch(e){ showToast("Erro ao salvar: "+e.message,"error"); }
    setSaving(false);
  };

  const delFin = async (id) => {
    if(!confirm("Excluir recebimento?"))return;
    await FS.del("financeiros",id);
    showToast("Recebimento excluído.","info");
  };

  const importFinRows = async (rows) => {
    showToast("Importando "+rows.length+" registros...","info");
    for(const r of rows){ await FS.add("financeiros", r); }
    showToast(rows.length+" recebimentos importados!");
  };

  // ── AUTH ─────────────────────────────────────────────────────────────
  const handleLogin  = u => { setCurrentUser(u); LS.set("hp:session",u); };
  const handleLogout = () => { setCurrentUser(null); LS.set("hp:session",null); setDataReady(false); };

  // ── FILTERS ──────────────────────────────────────────────────────────
  const applyF = (list,f) => list.filter(r=>{
    if(f.operacao&&!(r.operacao||"").toLowerCase().includes(f.operacao.toLowerCase()))return false;
    if(f.cliente&&!(r.cliente||"").toLowerCase().includes(f.cliente.toLowerCase()))return false;
    if(f.lote){
      const q=f.lote.toLowerCase();
      const match = r.lotes?.some(l=>(l.codigo||"").toLowerCase().includes(q)) || (r.lote||"").toLowerCase().includes(q);
      if(!match)return false;
    }
    if(f.data&&r.data!==f.data)return false;
    return true;
  });
  const filteredCad = applyF(cadastros, cadFilters);
  const filteredFin = applyF(financeiros, finFilters);

  const filterOp = [];
  cadastros.forEach(c=>{
    const lts = c.lotes&&c.lotes.length>0 ? c.lotes : [{codigo:c.lote||"",cu_pct:c.cu_pct,cert_cu_pct:c.cert_cu_pct,vl_ponto_cu:c.vl_ponto_cu,valor_cu:c.valor_cu,au_gr:c.au_gr,cert_au:c.cert_au,ponto_au:c.ponto_au,valor_au:c.valor_au,peso:c.peso,umidade:c.umidade,peso_seco:c.peso_seco,certificadora:c.certificadora,data_lote:c.data_lote||c.data||"",custo_total:c.custo_total,containers:[]}];
    lts.forEach(l=>{
      if(relOpF.lote&&!(l.codigo||"").toLowerCase().includes(relOpF.lote.toLowerCase()))return;
      if(relOpF.operacao&&!c.operacao.toLowerCase().includes(relOpF.operacao.toLowerCase()))return;
      if(relOpF.data_ini&&c.data<relOpF.data_ini)return;
      if(relOpF.data_fim&&c.data>relOpF.data_fim)return;
      filterOp.push({...l,operacao:c.operacao,cliente:c.cliente,data:c.data,_cadId:c.id});
    });
  });
  const filterFin = financeiros.filter(f=>{
    if(relFinF.cliente&&!(f.cliente||"").toLowerCase().includes(relFinF.cliente.toLowerCase()))return false;
    if(relFinF.operacao&&!(f.operacao||"").toLowerCase().includes(relFinF.operacao.toLowerCase()))return false;
    if(relFinF.data_ini&&f.data<relFinF.data_ini)return false;
    if(relFinF.data_fim&&f.data>relFinF.data_fim)return false;
    return true;
  });
  const finWithBal = (()=>{
    let bal = 0;
    return [...filterFin].reverse().map(f=>{ const prev=bal; bal+=parseFloat(f.valor)||0; return {...f,saldo_anterior:prev,saldo_atual:bal}; }).reverse();
  })();

  const totalCusto = cadastros.reduce((a,c)=>a+(parseFloat(c.custo_total)||0),0);
  const totalRec   = financeiros.reduce((a,f)=>a+(parseFloat(f.valor)||0),0);
  const saldo      = totalRec;

  // ── RENDER GUARDS ─────────────────────────────────────────────────────
  if(FB_LIB_MISSING) return (
    <div className="login-screen">
      <div className="login-card fade-in" style={{maxWidth:480}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{width:52,height:52,background:"linear-gradient(135deg,#C9A84C,#8B5E1A)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontFamily:"'Bebas Neue',sans-serif",color:"#0D0F14",margin:"0 auto 14px"}}>HP</div>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:".1em",color:"#C9A84C"}}>HP SISTEMA</div>
        </div>
        <div style={{background:"rgba(231,76,60,.1)",border:"1px solid rgba(231,76,60,.4)",borderRadius:6,padding:"14px 16px",marginBottom:16}}>
          <div style={{color:"#E74C3C",fontWeight:700,fontSize:12,marginBottom:6}}>⚠ Biblioteca Firebase não carregou</div>
          <div style={{color:"#7A8299",fontSize:12,lineHeight:1.7}}>
            Isso acontece quando o arquivo é aberto localmente. O sistema precisa ser acessado pelo link publicado no <strong style={{color:"#E8ECF4"}}>Vercel</strong>.
          </div>
        </div>
        <div style={{background:"#1E2330",border:"1px solid #2E3650",borderRadius:6,padding:"12px 16px"}}>
          <div style={{fontSize:10,fontWeight:700,color:"#C9A84C",letterSpacing:".1em",marginBottom:8}}>COMO ACESSAR CORRETAMENTE</div>
          {[
            "Acesse vercel.com e entre no seu projeto",
            "Clique no link de domínio do projeto (ex: hp-sistema.vercel.app)",
            "Faça login normalmente pelo navegador"
          ].map((t,i)=>(
            <div key={i} style={{display:"flex",gap:10,marginBottom:6,alignItems:"flex-start"}}>
              <span style={{minWidth:20,height:20,background:"#C9A84C",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#0D0F14",flexShrink:0}}>{i+1}</span>
              <span style={{fontSize:12,color:"#E8ECF4",lineHeight:1.5}}>{t}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
  if(!FB_READY)    return <SetupScreen/>;
  if(!authChecked) return <LoadingScreen msg="Verificando conexão..."/>;
  if(!currentUser) return <LoginScreen onLogin={handleLogin}/>;
  if(!dataReady)   return <LoadingScreen msg="Carregando dados..."/>;

  // ── RENDER ─────────────────────────────────────────────────────────────
  return (
    <>
      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}

      {showCadForm&&<div className="modal-overlay"><div className="modal fade-in" style={{maxWidth:1100,height:"88vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <CadastroForm initial={editCad} onSave={saveCad} onCancel={()=>{setShowCadForm(false);setEditCad(null);}} certifiers={certifiers} onManageCerts={()=>setShowCertMgr(true)} saving={saving} opSeq={editCad?null:cadastros.length+1} currentUser={currentUser}/>
      </div></div>}
      {showFinForm&&<div className="modal-overlay"><div className="modal fade-in" style={{maxWidth:700}}>
        <FinanceiroForm initial={editFin} onSave={saveFin} onCancel={()=>{setShowFinForm(false);setEditFin(null);}} cadastros={cadastros} saving={saving}/>
      </div></div>}
      {showCertMgr&&<CertifierManager certifiers={certifiers} onSave={updateCertifiers} onClose={()=>setShowCertMgr(false)}/>}
      {showImportCad&&<ImportModal type="cadastro" onImport={importCadRows} onClose={()=>setShowImportCad(false)} certifiers={certifiers}/>}
      {showImportFin&&<ImportModal type="financeiro" onImport={importFinRows} onClose={()=>setShowImportFin(false)} certifiers={certifiers}/>}
      {showUserMgr&&<UserManager onClose={()=>setShowUserMgr(false)} currentUser={currentUser} showToast={showToast}/>}
      {showBackup&&<BackupModal onClose={()=>setShowBackup(false)} showToast={showToast}/>}

      <Nav active={tab} setActive={setTab} currentUser={currentUser} onLogout={handleLogout} onManageUsers={()=>setShowUserMgr(true)} onBackup={()=>setShowBackup(true)}/>

      <div style={{padding:"24px 28px",maxWidth:1600,margin:"0 auto"}}>

        {/* ── PAINEL ─────────────────────────────────────────────── */}
        {tab==="dashboard"&&<div className="fade-in">
          <div style={{marginBottom:24}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,letterSpacing:".08em",color:"#C9A84C"}}>PAINEL GERAL</div>
            <div style={{color:"#7A8299",fontSize:13}}>Visão consolidada das operações</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:24}}>
            <StatCard label="Operações Cadastradas" value={cadastros.length} color="#C9A84C"/>
            <StatCard label="Total de Recebimentos" value={financeiros.length} color="#3B82F6"/>
            <StatCard label="Custo Total Operações" value={fmtCur(totalCusto)} color="#E74C3C"/>
            <StatCard label="Saldo Atual" value={financeiros.length ? fmtCur(saldo) : "—"} color="#2ECC71"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,marginBottom:18}}>
            <div className="card">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <div className="section-title" style={{fontSize:16}}>ÚLTIMAS OPERAÇÕES</div>
                <button className="btn btn-gold btn-sm" onClick={()=>{setTab("cadastro");setShowCadForm(true);}}>+ Nova</button>
              </div>
              <table><thead><tr><th>Operação</th><th>Cliente</th><th>Data</th><th>Lotes</th><th>Custo Total</th></tr></thead>
                <tbody>
                  {cadastros.slice(-8).reverse().map(c=><tr key={c.id}><td><span className="tag badge-gold">{c.operacao}</span></td><td style={{color:"#7A8299"}}>{c.cliente}</td><td style={{color:"#7A8299"}}>{c.data}</td><td style={{textAlign:"center"}}><span className="tag badge-blue">{(c.lotes||[]).length}</span></td><td className="text-gold">{fmtCur(c.custo_total)}</td></tr>)}
                  {cadastros.length===0&&<tr><td colSpan={5} style={{textAlign:"center",color:"#7A8299",padding:24}}>Nenhuma operação registrada</td></tr>}
                </tbody>
              </table>
            </div>
            <div className="card">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <div className="section-title" style={{fontSize:16}}>ÚLTIMOS RECEBIMENTOS</div>
                <button className="btn btn-gold btn-sm" onClick={()=>{setTab("financeiro");setShowFinForm(true);}}>+ Novo</button>
              </div>
              <table><thead><tr><th>Data</th><th>Cliente</th><th>Valor</th><th>Forma</th></tr></thead>
                <tbody>
                  {financeiros.slice(-8).reverse().map(f=><tr key={f.id}><td style={{color:"#7A8299"}}>{f.data}</td><td>{f.cliente}</td><td className="text-green">{fmtCur(f.valor)}</td><td><span className="tag badge-blue">{f.forma_pgto}</span></td></tr>)}
                  {financeiros.length===0&&<tr><td colSpan={4} style={{textAlign:"center",color:"#7A8299",padding:24}}>Nenhum recebimento</td></tr>}
                </tbody>
              </table>
            </div>
          </div>

        </div>}

        {/* ── CADASTRO ─────────────────────────────────────────── */}
        {tab==="cadastro"&&<div className="fade-in">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
            <div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,letterSpacing:".08em",color:"#C9A84C"}}>CADASTRO DE OPERAÇÃO</div>
              <div style={{color:"#7A8299",fontSize:13}}>{cadastros.length} operações • {filteredCad.length} exibidas</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btn-outline btn-sm" onClick={()=>setShowCertMgr(true)}>⚙ Certificadoras</button>
              {canImport&&<button className="btn btn-green btn-sm" onClick={()=>setShowImportCad(true)}>⬆ Importar Planilha</button>}
              {rascunhos.length>0&&(
                <button className="btn btn-outline btn-sm" style={{borderColor:"#C9A84C",color:"#C9A84C"}}
                  onClick={()=>{
                    const r=rascunhos[0];
                    if(confirm(`Recuperar rascunho "${r.operacao||"sem nome"}" salvo em ${r._savedAt?new Date(r._savedAt).toLocaleString("pt-BR"):"data desconhecida"}?`)){
                      setEditCad(r); setShowCadForm(true);
                    }
                  }}>
                  ⟳ Rascunho ({rascunhos.length})
                </button>
              )}
              <button className="btn btn-gold" onClick={()=>{setEditCad(null);setShowCadForm(true);}}>+ Nova Operação</button>
            </div>
          </div>
          <FilterBar filters={cadFilters} setFilters={setCadFilters} count={filteredCad.length} total={cadastros.length} onClear={()=>setCadFilters({operacao:"",cliente:"",lote:"",data:""})}/>
          <div style={{overflowX:"auto"}}>
            <table>
              <thead><tr><th>#</th><th>Operação</th><th>Cliente</th><th>Data</th><th style={{textAlign:"center"}}>Lotes</th><th style={{textAlign:"center"}}>Containers</th><th>Custo Total</th><th style={{textAlign:"center",minWidth:120}}>Ações</th></tr></thead>
              <tbody>
                {filteredCad.map((c,i)=>{
                  const totalCntrs = (c.lotes||[]).reduce((a,l)=>a+(l.containers?.length||0),0);
                  return (
                    <tr key={c.id}>
                      <td className="text-muted">{i+1}</td>
                      <td><span className="tag badge-gold">{c.operacao}</span></td>
                      <td>{c.cliente}</td>
                      <td className="text-muted">{c.data}</td>
                      <td style={{textAlign:"center"}}><span className="tag badge-blue">{(c.lotes||[]).length}</span></td>
                      <td style={{textAlign:"center"}}><span className="tag badge-green">{totalCntrs}</span></td>
                      <td style={{fontWeight:600,color:"#C9A84C"}}>{fmtCur(c.custo_total)}</td>
                      <td style={{display:"flex",gap:6,justifyContent:"center",padding:"6px 8px"}}>
                        <button className="btn btn-outline btn-sm" onClick={()=>{setEditCad(c);setShowCadForm(true);}}>✎ Editar</button>
                        {canDelete&&<button className="btn btn-danger" onClick={()=>delCad(c.id)}>✕</button>}
                      </td>
                    </tr>
                  );
                })}
                {filteredCad.length===0&&<tr><td colSpan={8} style={{textAlign:"center",color:"#7A8299",padding:40}}>{cadastros.length===0?"Nenhuma operação cadastrada.":"Nenhum resultado para os filtros."}</td></tr>}
              </tbody>
            </table>
          </div>
        </div>}

        {/* ── FINANCEIRO ────────────────────────────────────────── */}
        {tab==="financeiro"&&<div className="fade-in">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
            <div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,letterSpacing:".08em",color:"#C9A84C"}}>RECEBIMENTOS</div>
              <div style={{color:"#7A8299",fontSize:13}}>{financeiros.length>0&&<>Saldo atual: <span style={{color:"#2ECC71",fontFamily:"'IBM Plex Mono',monospace"}}>{fmtCur(saldo)}</span></>}</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              {canImport&&<button className="btn btn-green btn-sm" onClick={()=>setShowImportFin(true)}>⬆ Importar Planilha</button>}
              <button className="btn btn-gold" onClick={()=>{setEditFin(null);setShowFinForm(true);}}>+ Novo Recebimento</button>
            </div>
          </div>
          <FilterBar filters={finFilters} setFilters={setFinFilters} count={filteredFin.length} total={financeiros.length} onClear={()=>setFinFilters({operacao:"",cliente:"",lote:"",data:""})}/>
          <div style={{overflowX:"auto"}}>
            <table>
              <thead><tr><th>#</th><th>Data</th><th>Cliente</th><th>Lote</th><th>Operação</th><th>Valor</th><th>Forma Pgto</th><th>Observações</th><th>Incluído por</th><th style={{textAlign:"center",minWidth:120}}>Ações</th></tr></thead>
              <tbody>
                {filteredFin.map((f,i)=>(
                  <tr key={f.id}>
                    <td className="text-muted">{i+1}</td>
                    <td className="text-muted">{f.data}</td><td>{f.cliente}</td>
                    <td className="text-gold">{f.lote}</td><td>{f.operacao}</td>
                    <td className="text-green" style={{fontWeight:600}}>{fmtCur(f.valor)}</td>
                    <td><span className="tag badge-blue">{f.forma_pgto}</span></td>
                    <td style={{color:"#7A8299",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis"}}>{f.obs}</td>
                    <td style={{color:"#7A8299",fontSize:11}}>{f.usuario_inclusao||"—"}</td>
                    <td style={{display:"flex",gap:6,justifyContent:"center",padding:"6px 8px"}}>
                      <button className="btn btn-outline btn-sm" onClick={()=>{setEditFin(f);setShowFinForm(true);}}>✎ Editar</button>
                      {canDelete&&<button className="btn btn-danger" onClick={()=>delFin(f.id)}>✕</button>}
                    </td>
                  </tr>
                ))}
                {filteredFin.length===0&&<tr><td colSpan={10} style={{textAlign:"center",color:"#7A8299",padding:40}}>{financeiros.length===0?"Nenhum recebimento registrado.":"Nenhum resultado para os filtros."}</td></tr>}
              </tbody>
            </table>
          </div>
        </div>}

        {/* ── REL. OPERAÇÃO ────────────────────────────────────── */}
        {tab==="rel_operacao"&&<div className="fade-in">
          <div style={{marginBottom:20}}><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,letterSpacing:".08em",color:"#C9A84C"}}>RELATÓRIO DE OPERAÇÃO</div></div>
          <div className="card no-print" style={{marginBottom:18}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:".12em",color:"#7A8299",textTransform:"uppercase",marginBottom:10}}>FILTROS</div>
            <Grid cols={4}>
              <FG label="Lote"><input value={relOpF.lote} onChange={e=>setRelOpF(p=>({...p,lote:e.target.value}))} placeholder="Filtrar lote..."/></FG>
              <FG label="Operação"><input value={relOpF.operacao} onChange={e=>setRelOpF(p=>({...p,operacao:e.target.value}))} placeholder="Filtrar operação..."/></FG>
              <FG label="Data Inicial"><input type="date" value={relOpF.data_ini} onChange={e=>setRelOpF(p=>({...p,data_ini:e.target.value}))}/></FG>
              <FG label="Data Final"><input type="date" value={relOpF.data_fim} onChange={e=>setRelOpF(p=>({...p,data_fim:e.target.value}))}/></FG>
            </Grid>
            <div style={{marginTop:10,display:"flex",gap:8,justifyContent:"flex-end",alignItems:"center"}}>
              <span style={{fontSize:12,color:"#7A8299"}}>{filterOp.length} resultado(s)</span>
              <button className="btn btn-outline btn-sm" onClick={()=>setRelOpF({lote:"",operacao:"",data_ini:"",data_fim:""})}>Limpar</button>
              <button className="btn btn-gold btn-sm" onClick={()=>window.print()}>🖨 Imprimir</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:18}}>
            <StatCard label="Lotes" value={filterOp.length} color="#C9A84C"/>
            <StatCard label="Total CU" value={fmtCur(filterOp.reduce((a,l)=>a+(parseFloat(l.valor_cu)||0),0))} color="#C9A84C"/>
            <StatCard label="Total AU" value={fmtCur(filterOp.reduce((a,l)=>a+(parseFloat(l.valor_au)||0),0))} color="#C9A84C"/>
            <StatCard label="Total Geral" value={fmtCur(filterOp.reduce((a,l)=>a+(parseFloat(l.custo_total)||0),0))} color="#2ECC71"/>
          </div>
          <div style={{overflowX:"auto"}}>
            <table>
              <thead><tr><th>Data</th><th>Operação</th><th>Cliente</th><th>Lote</th><th>Containers</th><th>CU%</th><th>AU-GR</th><th>Peso (kg)</th><th>Peso Seco</th><th>Valor CU</th><th>Valor AU</th><th>Custo Total</th><th>Certif.</th></tr></thead>
              <tbody>
                {filterOp.map((l,i)=><tr key={i}><td>{l.data}</td><td>{l.operacao}</td><td>{l.cliente}</td><td className="text-gold">{l.codigo||"—"}</td><td style={{textAlign:"center"}}><span className="tag badge-blue">{l.containers?.length||0}</span></td><td>{fmtPct(l.cu_pct)}</td><td>{fmt(l.au_gr)}</td><td>{fmt(l.peso)}</td><td>{fmt(l.peso_seco)}</td><td>{fmtCur(l.valor_cu)}</td><td>{fmtCur(l.valor_au)}</td><td style={{fontWeight:600,color:"#C9A84C"}}>{fmtCur(l.custo_total)}</td><td>{l.certificadora}</td></tr>)}
                {filterOp.length===0&&<tr><td colSpan={13} style={{textAlign:"center",color:"#7A8299",padding:32}}>Nenhum resultado.</td></tr>}
                {filterOp.length>0&&<tr style={{background:"#1E2330",borderTop:"2px solid #C9A84C"}}>
                  <td colSpan={9} style={{fontWeight:700,color:"#7A8299",fontSize:11}}>TOTAIS</td>
                  <td style={{fontWeight:700,color:"#C9A84C"}}>{fmtCur(filterOp.reduce((a,l)=>a+(parseFloat(l.valor_cu)||0),0))}</td>
                  <td style={{fontWeight:700,color:"#C9A84C"}}>{fmtCur(filterOp.reduce((a,l)=>a+(parseFloat(l.valor_au)||0),0))}</td>
                  <td style={{fontWeight:700,color:"#C9A84C"}}>{fmtCur(filterOp.reduce((a,l)=>a+(parseFloat(l.custo_total)||0),0))}</td>
                  <td></td>
                </tr>}
              </tbody>
            </table>
          </div>
        </div>}

        {/* ── REL. FINANCEIRO ───────────────────────────────────── */}
        {tab==="rel_financeiro"&&<div className="fade-in">
          <div style={{marginBottom:20}}><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,letterSpacing:".08em",color:"#C9A84C"}}>RELATÓRIO FINANCEIRO</div></div>
          <div className="card no-print" style={{marginBottom:18}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:".12em",color:"#7A8299",textTransform:"uppercase",marginBottom:10}}>FILTROS</div>
            <Grid cols={4}>
              <FG label="Cliente"><input value={relFinF.cliente} onChange={e=>setRelFinF(p=>({...p,cliente:e.target.value}))} placeholder="Filtrar cliente..."/></FG>
              <FG label="Operação"><input value={relFinF.operacao} onChange={e=>setRelFinF(p=>({...p,operacao:e.target.value}))} placeholder="Filtrar operação..."/></FG>
              <FG label="Data Inicial"><input type="date" value={relFinF.data_ini} onChange={e=>setRelFinF(p=>({...p,data_ini:e.target.value}))}/></FG>
              <FG label="Data Final"><input type="date" value={relFinF.data_fim} onChange={e=>setRelFinF(p=>({...p,data_fim:e.target.value}))}/></FG>
            </Grid>
            <div style={{marginTop:10,display:"flex",gap:8,justifyContent:"flex-end",alignItems:"center"}}>
              <span style={{fontSize:12,color:"#7A8299"}}>{filterFin.length} resultado(s)</span>
              <button className="btn btn-outline btn-sm" onClick={()=>setRelFinF({cliente:"",operacao:"",data_ini:"",data_fim:""})}>Limpar</button>
              <button className="btn btn-gold btn-sm" onClick={()=>window.print()}>🖨 Imprimir</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:18}}>
            <StatCard label="Transações" value={filterFin.length} color="#C9A84C"/>
            <StatCard label="Total Recebido" value={fmtCur(filterFin.reduce((a,f)=>a+(parseFloat(f.valor)||0),0))} color="#2ECC71"/>
            <StatCard label="Saldo Atual" value={financeiros.length ? fmtCur(saldo) : "—"} color="#2ECC71"/>
          </div>
          <div style={{overflowX:"auto"}}>
            <table>
              <thead><tr><th>Data</th><th>Cliente</th><th>Lote</th><th>Operação</th><th>Valor</th><th>Saldo Anterior</th><th>Saldo Atual</th><th>Forma Pgto</th><th>Obs</th></tr></thead>
              <tbody>
                {finWithBal.map(f=><tr key={f.id}><td>{f.data}</td><td>{f.cliente}</td><td className="text-gold">{f.lote}</td><td>{f.operacao}</td><td className="text-green" style={{fontWeight:600}}>{fmtCur(f.valor)}</td><td style={{color:"#7A8299"}}>{fmtCur(f.saldo_anterior)}</td><td style={{color:"#2ECC71",fontWeight:600}}>{fmtCur(f.saldo_atual)}</td><td><span className="tag badge-blue">{f.forma_pgto}</span></td><td style={{color:"#7A8299",fontSize:11}}>{f.obs}</td></tr>)}
                {finWithBal.length===0&&<tr><td colSpan={9} style={{textAlign:"center",color:"#7A8299",padding:32}}>Nenhum resultado.</td></tr>}
                {finWithBal.length>0&&<tr style={{background:"#1E2330",borderTop:"2px solid #2ECC71"}}>
                  <td colSpan={4} style={{fontWeight:700,color:"#7A8299",fontSize:11}}>TOTAIS</td>
                  <td style={{fontWeight:700,color:"#2ECC71"}}>{fmtCur(filterFin.reduce((a,f)=>a+(parseFloat(f.valor)||0),0))}</td>
                  <td></td><td style={{fontWeight:700,color:"#2ECC71"}}>{fmtCur(saldo)}</td>
                  <td colSpan={2}></td>
                </tr>}
              </tbody>
            </table>
          </div>
        </div>}

      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
